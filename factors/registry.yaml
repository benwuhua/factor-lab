factors:
  - name: ret_5
    expression: "$close / Ref($close, 5) - 1"
    direction: 1
    category: momentum
    description: "5 day close-to-close return."
  - name: ret_20
    expression: "$close / Ref($close, 20) - 1"
    direction: 1
    category: momentum
    description: "20 day close-to-close return."
  - name: ret_60
    expression: "$close / Ref($close, 60) - 1"
    direction: 1
    category: momentum
    description: "60 day close-to-close return."
  - name: reversal_5
    expression: "Ref($close, 5) / $close - 1"
    direction: 1
    category: reversal
    description: "Short-term reversal candidate based on 5 day price move."
  - name: vol_20
    expression: "Std($close / Ref($close, 1) - 1, 20)"
    direction: -1
    category: volatility
    description: "20 day realized volatility; lower volatility is often tested as defensive."
  - name: vol_adj_mom_20
    expression: "($close / Ref($close, 20) - 1) / Std($close / Ref($close, 1) - 1, 20)"
    direction: 1
    category: momentum
    description: "20 day momentum scaled by recent realized volatility."
  - name: turnover_20
    expression: "Mean($volume, 20) / Mean($volume, 60)"
    direction: 1
    category: volume
    description: "Recent volume activity relative to the medium-term baseline."
  - name: tushare_ep_ttm
    expression: "1 / ($pe_ttm + 0.000001)"
    direction: 1
    category: value
    description: "Tushare daily_basic earnings yield proxy from PE TTM; higher is cheaper, negative PE naturally ranks poorly."
  - name: tushare_bp
    expression: "1 / ($pb + 0.000001)"
    direction: 1
    category: value
    description: "Tushare daily_basic book-to-price proxy from PB; higher is cheaper."
  - name: tushare_dividend_yield
    expression: "$dividend_yield"
    direction: 1
    category: dividend
    description: "Tushare daily_basic dividend yield field."
  - name: tushare_amount_20
    expression: "Mean($amount, 20)"
    direction: 1
    category: liquidity
    description: "20 day average traded amount from the Tushare-backed Qlib market data."
  - name: tushare_free_float_turnover_20
    expression: "Mean($turnover_rate_f, 20)"
    direction: 1
    category: liquidity
    description: "20 day average free-float turnover from Tushare daily_basic."
  - name: tushare_total_mv
    expression: "$total_mv"
    direction: 1
    category: size_capacity
    description: "Tushare daily_basic total market value, mainly for capacity and exposure diagnostics."
  - name: price_position_20
    expression: "($close - Min($low, 20)) / (Max($high, 20) - Min($low, 20) + 1e-12)"
    direction: 1
    category: price_position
    description: "Close location in the recent 20 day high-low range."
  - name: high_mean60_discount_volume_divergence_reversal_20_60_v1
    expression: "0-Corr($high/Mean($high,20),$volume/Mean($volume,20),20)+(Mean($high,60)-$close)/$close"
    direction: 1
    category: autoresearch_divergence
    description: "Promoted autoresearch factor: 20 day high-price versus volume divergence with a 60 day mean-high discount reversal term."
  - name: fast_high_60d_discount_volume_divergence_reversal_10_60_v1
    expression: "0-Corr($high/Mean($high,10),$volume/Mean($volume,10),10)+(Mean($high,60)-$close)/Mean($high,60)"
    direction: 1
    category: autoresearch_divergence
    description: "Promoted autoresearch factor: faster 10 day high-price versus volume divergence with a 60 day mean-high discount reversal term."
  - name: high_norm_price_volume_divergence_20_v1
    expression: "0-Corr($high/Mean($high,20),$volume/Mean($volume,20),20)"
    direction: 1
    category: autoresearch_divergence
    description: "Promoted autoresearch factor: 20 day divergence between high-normalized price strength and normalized volume."
  - name: normalized_price_volume_divergence_20_v1
    expression: "0-Corr($close/Mean($close,20),$volume/Mean($volume,20),20)"
    direction: 1
    category: autoresearch_divergence
    description: "Promoted autoresearch factor: 20 day negative correlation between normalized close and normalized volume."
  - name: high_norm_price_amount_divergence_20_v1
    expression: "0-Corr($high/Mean($high,20),$amount/Mean($amount,20),20)"
    direction: 1
    category: autoresearch_divergence
    description: "Promoted autoresearch factor: 20 day divergence between high-normalized price strength and normalized traded amount."
  - name: quiet_close_range_divergence_20_v1
    expression: "0 - Corr($close / Mean($close, 20), $high / $low - 1, 20)"
    direction: 1
    category: autoresearch_divergence
    description: "Promoted autoresearch factor: quiet close-strength versus intraday range divergence, intended to capture calm accumulation."
  - name: intraday_volatility_skew_20_v1
    expression: "Std($high / $open, 20) - Std($open / $low, 20)"
    direction: -1
    category: autoresearch_volatility
    description: "Promoted autoresearch factor: difference between upside and downside intraday excursion volatility over 20 days."
  - name: two_sided_excursion_convergence_20_v1
    expression: "Corr(($high - $open) / ($open + 1e-12), ($open - $low) / ($open + 1e-12), 20)"
    direction: -1
    category: autoresearch_volatility
    description: "Promoted autoresearch factor: 20 day convergence between upside and downside intraday excursions around the open."
  - name: open_norm_selling_pressure_reversal_20_60_v1
    expression: "Mean(($open - $close) / $open, 20) + Mean(($open - $close) / $open, 60)"
    direction: 1
    category: autoresearch_reversal
    description: "Promoted autoresearch factor: blended 20 and 60 day open-normalized intraday selling-pressure reversal."
