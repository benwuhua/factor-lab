portfolio:
  top_k: 20
  cash_buffer: 0.05
  max_single_weight: 0.08
  max_new_buys: 5
  dropout_rank: 30
  score_column: ensemble_score
  profile: balanced
  profile_confirmation_columns:
    - family_growth_improvement_score
    - family_momentum_score
    - family_theme_score
    - family_event_score
  profile_constraints:
    defensive:
      max_single_weight: 0.05
    balanced: {}
    offensive:
      max_defensive_family_weight: 0.35
  require_positive_non_quality_confirmation: true
  confirmation_exclude_families:
    - fundamental_quality
  confirmation_min_score: 0.05
  required_min_scores:
    quality_low_leverage_contribution: 0.0

output:
  target_portfolio: reports/target_portfolio_{run_yyyymmdd}.csv
  summary: reports/target_portfolio_summary_{run_yyyymmdd}.md
