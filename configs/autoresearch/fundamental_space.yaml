description: "Point-in-time fundamental quality lane. The lane reads data/fundamental_quality.csv; agent edits should change this spec, not evaluator code."
data_domain: fundamental_quality
source_path: data/fundamental_quality.csv
logic_buckets:
  - profitability_quality
  - balance_sheet_risk
  - quality_low_leverage
  - fundamental_value
  - fundamental_growth
  - fundamental_dividend
candidate_factors:
  - name: fundamental_ep
    family: value
    category: candidate_fundamental_csv
    logic_bucket: fundamental_value
    field: ep
    components:
      - field: ep
        direction: 1
        weight: 1.0
    direction: 1
    active: true
    review_status: candidate
    description: "source_table=data/fundamental_quality.csv; source_field=ep; role=value alpha."
  - name: fundamental_cfp
    family: value
    category: candidate_fundamental_csv
    logic_bucket: fundamental_value
    field: cfp
    components:
      - field: cfp
        direction: 1
        weight: 1.0
    direction: 1
    active: true
    review_status: candidate
    description: "source_table=data/fundamental_quality.csv; source_field=cfp; role=cashflow value alpha."
  - name: fundamental_dividend_yield
    family: value
    category: candidate_fundamental_csv
    logic_bucket: fundamental_value
    field: dividend_yield
    components:
      - field: dividend_yield
        direction: 1
        weight: 1.0
    direction: 1
    active: true
    review_status: candidate
    description: "source_table=data/fundamental_quality.csv; source_field=dividend_yield; role=shareholder yield alpha."
  - name: fundamental_roe
    family: quality
    category: candidate_fundamental_csv
    logic_bucket: profitability_quality
    field: roe
    components:
      - field: roe
        direction: 1
        weight: 1.0
    direction: 1
    active: true
    review_status: candidate
    description: "source_table=data/fundamental_quality.csv; source_field=roe; role=profitability quality alpha."
  - name: fundamental_roic
    family: quality
    category: candidate_fundamental_csv
    logic_bucket: profitability_quality
    field: roic
    components:
      - field: roic
        direction: 1
        weight: 1.0
    direction: 1
    active: true
    review_status: data_gated
    description: "source_table=data/fundamental_quality.csv; source_field=roic; role=capital efficiency alpha when upstream coverage exists."
  - name: fundamental_cfo_to_ni
    family: quality
    category: candidate_fundamental_csv
    logic_bucket: profitability_quality
    field: operating_cashflow_to_net_profit
    components:
      - field: operating_cashflow_to_net_profit
        direction: 1
        weight: 1.0
    direction: 1
    active: true
    review_status: candidate
    description: "source_table=data/fundamental_quality.csv; source_field=operating_cashflow_to_net_profit; role=earnings quality alpha."
  - name: fundamental_low_debt
    family: quality
    category: candidate_fundamental_csv
    logic_bucket: balance_sheet_risk
    field: debt_ratio
    components:
      - field: debt_ratio
        direction: -1
        weight: 1.0
    direction: -1
    active: true
    review_status: watch
    description: "source_table=data/fundamental_quality.csv; source_field=debt_ratio; role=balance-sheet guardrail."
  - name: fundamental_low_accrual
    family: quality
    category: candidate_fundamental_csv
    logic_bucket: profitability_quality
    field: accrual_ratio
    components:
      - field: accrual_ratio
        direction: -1
        weight: 1.0
    direction: -1
    active: true
    review_status: data_gated
    description: "source_table=data/fundamental_quality.csv; source_field=accrual_ratio; role=accounting quality guardrail."
  - name: fundamental_revenue_growth_change
    family: growth_improvement
    category: candidate_fundamental_csv
    logic_bucket: fundamental_growth
    field: revenue_growth_change_yoy
    components:
      - field: revenue_growth_change_yoy
        direction: 1
        weight: 1.0
    direction: 1
    active: true
    review_status: data_gated
    description: "source_table=data/fundamental_quality.csv; source_field=revenue_growth_change_yoy; role=growth acceleration alpha."
  - name: fundamental_profit_growth_change
    family: growth_improvement
    category: candidate_fundamental_csv
    logic_bucket: fundamental_growth
    field: net_profit_growth_change_yoy
    components:
      - field: net_profit_growth_change_yoy
        direction: 1
        weight: 1.0
    direction: 1
    active: true
    review_status: data_gated
    description: "source_table=data/fundamental_quality.csv; source_field=net_profit_growth_change_yoy; role=earnings acceleration alpha."
  - name: fundamental_margin_change
    family: growth_improvement
    category: candidate_fundamental_csv
    logic_bucket: fundamental_growth
    field: gross_margin_change_yoy
    components:
      - field: gross_margin_change_yoy
        direction: 1
        weight: 1.0
    direction: 1
    active: true
    review_status: data_gated
    description: "source_table=data/fundamental_quality.csv; source_field=gross_margin_change_yoy; role=margin improvement alpha."
  - name: fundamental_dividend_stability
    family: dividend
    category: candidate_fundamental_csv
    logic_bucket: fundamental_dividend
    field: dividend_stability
    components:
      - field: dividend_stability
        direction: 1
        weight: 1.0
    direction: 1
    active: true
    review_status: data_gated
    description: "source_table=data/fundamental_quality.csv; source_field=dividend_stability; role=dividend quality guardrail."
  - name: fundamental_dividend_cashflow_coverage
    family: dividend
    category: candidate_fundamental_csv
    logic_bucket: fundamental_dividend
    field: dividend_cashflow_coverage
    components:
      - field: dividend_cashflow_coverage
        direction: 1
        weight: 1.0
    direction: 1
    active: true
    review_status: data_gated
    description: "source_table=data/fundamental_quality.csv; source_field=dividend_cashflow_coverage; role=dividend sustainability guardrail."
  - name: roe
    family: quality
    category: candidate_quality
    logic_bucket: profitability_quality
    direction: 1
    active: true
    review_status: candidate
    description: "Point-in-time return on equity; higher quality is ranked higher."
  - name: debt_ratio
    family: value_risk
    category: candidate_quality
    logic_bucket: balance_sheet_risk
    direction: -1
    active: true
    review_status: candidate
    description: "Point-in-time debt ratio; lower leverage is ranked higher."
  - name: quality_low_leverage
    family: quality_low_leverage
    category: candidate_fundamental_combo
    logic_bucket: quality_low_leverage
    direction: 1
    active: true
    review_status: candidate
    components:
      - field: roe
        direction: 1
        weight: 1.0
      - field: debt_ratio
        direction: -1
        weight: 0.25
    description: "ROE quality score with a low-weight low-leverage stabilizer. Debt ratio is deliberately small because standalone neutralized debt_ratio decays after size/industry control."
  - name: gross_margin
    family: quality
    category: candidate_quality
    logic_bucket: profitability_quality
    direction: 1
    active: false
    review_status: shadow
    description: "Gross margin is available for part of the universe, but first-pass IC was weak; keep as shadow."
pit_rules:
  date_column: available_at
  fallback_date_column: announce_date
  cannot_use_unannounced_report_period: true
families:
  value:
    fields:
      - ep
      - cfp
      - dividend_yield
    direction: 1
  quality:
    fields:
      - roe
      - roic
      - gross_margin
      - operating_cashflow_to_net_profit
      - accrual_ratio
    direction: 1
  value_risk:
    fields:
      - debt_ratio
    direction: -1
  quality_low_leverage:
    fields:
      - roe
      - debt_ratio
    direction: 1
    component_weights:
      roe: 1.0
      debt_ratio: 0.25
  growth:
    fields:
      - revenue_growth_yoy
      - net_profit_growth_yoy
    direction: 1
  growth_improvement:
    fields:
      - revenue_growth_change_yoy
      - net_profit_growth_change_yoy
      - gross_margin_change_yoy
    direction: 1
  dividend:
    fields:
      - dividend_stability
      - dividend_cashflow_coverage
    direction: 1
evaluation:
  horizons:
    - 20
    - 60
  primary_metric: rank_ic_mean
  minimum_observations: 500000
guards:
  min_coverage_ratio: 0.70
  require_available_at: true
  require_announce_date: true
  max_refresh_frequency: weekly
