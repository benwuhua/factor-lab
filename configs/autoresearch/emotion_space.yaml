lane: emotion_atmosphere
description: "A-share atmosphere factors built from the persistent data/emotion_atmosphere.csv domain."
logic_buckets:
  - emotion_atmosphere
  - crowding_cooling
  - breadth_mood
editable_fields:
  - source_column
  - signal_direction
  - score_blend
  - cooling_transform
guards:
  min_trade_count: 120
  max_top_quantile_turnover: 0.35
  require_breadth_regime_split: true
  max_logic_bucket_concentration: 0.45
templates:
  - name: instrument_emotion_score
    logic_bucket: emotion_atmosphere
    family: data_domain_emotion
    source_column: instrument_emotion_score
    direction: 1
  - name: crowding_cooling_score
    logic_bucket: crowding_cooling
    family: data_domain_emotion
    source_column: crowding_cooling_score
    direction: 1
  - name: emotion_pct_change
    logic_bucket: breadth_mood
    family: data_domain_emotion
    source_column: pct_change
    direction: 1
