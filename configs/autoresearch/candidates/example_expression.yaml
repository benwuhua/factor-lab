name: hl_mid_mean_reversion_60_v1
family: reversal
expression: "(Mean($high, 60) + Mean($low, 60)) / $close - 2"
direction: 1
description: "60 day high-low midpoint mean reversion; stocks trading below their average daily range midpoint rank higher."
expected_behavior: "Tests whether the reviewed medium-term reversion effect is stronger when the anchor uses the 60 day average high-low midpoint instead of close-only averages, while keeping complexity low."
