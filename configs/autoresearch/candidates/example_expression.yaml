name: open_gap_reversal_3_20_v1
family: reversal
expression: "0-Mean($open/Ref($close,3)-1,20)"
direction: 1
description: "20 day average reversal of the open price relative to the close from three trading days earlier."
expected_behavior: "Tests a compact gap-style reversal signal that is distinct from the heavily explored selling-pressure denominator variants, volume/amount divergence variants, discarded direct range-position ideas, and crash-prone turnover-confirmation idea. A high value means recent opens have been weak versus the close three sessions earlier, which may capture short-horizon opening-price pessimism before mean reversion. The expression uses only allowed open and close fields, allowed 3 and 20 day windows, and allowed Ref and Mean operators."
