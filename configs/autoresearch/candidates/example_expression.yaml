name: vol_damped_persistent_low_norm_pressure_reversal_20_60_v1
family: reversal
expression: "(Mean(($open-$close)/$low,20)*(1-Std($close,20)/Mean($close,20)))+Mean(($open-$close)/$low,60)"
direction: 1
description: "20 and 60 day low-normalized intraday selling-pressure reversal with a simple 20 day price-volatility dampener on the recent leg."
expected_behavior: "Mean(($open-$close)/$low,20) captures recent close-below-open pressure relative to the session low, while Mean(($open-$close)/$low,60) keeps the persistent pressure anchor that has repeatedly survived review. The 20 day leg is scaled by 1-Std($close,20)/Mean($close,20), so crowded high-volatility selloffs contribute less than steadier selling pressure with the same low-normalized body. This avoids the crashed turnover confirmation/divergence paths, avoids pure volatility or near-low filters that were discarded, and uses only allowed open, close, and low fields; allowed 20 and 60 day windows; and allowed Mean and Std operators."
