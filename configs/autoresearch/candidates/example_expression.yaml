name: low_anchor_dual_high_reversion_60_5_10_v1
family: reversal
expression: "Mean($low, 60) / ((Max($high, 5) + Mean($high, 10)) / 2) - 1"
direction: 1
description: "60 day low-anchor reversion measured against a dual high reference that blends the strict 5 day high ceiling with the smoother 10 day average high."
expected_behavior: "Extends the reviewed low-anchor high family without another single-window threshold tweak. The 5 day maximum high penalizes sharp short-term rebounds, while the 10 day average high captures sustained recent upper-price pressure; their midpoint keeps the denominator focused on stocks still compressed near a longer-run downside anchor. This stays in the low-complexity reversal family, uses only allowed low/high fields, 60/5/10 day windows, and simple rolling operators, while avoiding discarded turnover, VWAP, volatility-scaled, range-normalized, distance-from-low, and disallowed-window ideas."
