name: low_anchor_high_close_ceiling_reversion_60_3_10_v1
family: reversal
expression: "Mean($low, 60) / ((Max($high, 3) + Mean($close, 10)) / 2) - 1"
direction: 1
description: "60 day low-anchor reversion measured against a blend of the very recent high ceiling and 10 day accepted closing price; stocks still close to the longer-run low anchor without sustained closing-price repair rank higher."
expected_behavior: "Extends the reviewed low-anchor reversal family without repeating the discarded turnover, VWAP, volatility-scaled, range-normalized, distance-from-low, upper-shadow, or disallowed-window ideas. Mean($low, 60) supplies the stable downside anchor, Max($high, 3) penalizes fresh rebound spikes, and Mean($close, 10) adds a short accepted-price confirmation so names whose closes have already repaired are ranked lower than names with only transient intraday highs. Higher values should favor compressed stocks with limited follow-through from their 60 day low anchor. The expression uses only allowed low/high/close fields, 3/10/60 windows, and three rolling operators."
