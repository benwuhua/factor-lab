name: smoothed_low_norm_selling_pressure_reversal_20_60_v1
family: reversal
expression: "Mean($open - $close, 20) / Mean($low, 20) + Mean($open - $close, 60) / Mean($low, 60)"
direction: 1
description: "20 and 60 day smoothed low-normalized intraday selling pressure reversal."
expected_behavior: "Tests whether smoothing both the close-below-open body and the low-price denominator preserves the strong reviewed low_norm_selling_pressure_reversal premise while reducing single-day denominator noise. Higher values indicate persistent weak intraday closes relative to the stock's recent low-price scale, which may reflect capitulation and later mean reversion. This avoids discarded or crash-prone turnover confirmation, downside-only clipping, low-rebound, range-compression, high-pullback, and high-complexity OHLC-average ideas. The expression uses only allowed open, close, and low fields; allowed 20 and 60 day windows; and four allowed Mean operators."
