name: recent_weighted_low_norm_selling_pressure_reversal_20_60_v1
family: reversal
expression: "2 * Mean(($open - $close) / $low, 20) + Mean(($open - $close) / $low, 60)"
direction: 1
description: "Recent-weighted low-normalized intraday selling pressure reversal over 20 and 60 day horizons."
expected_behavior: "Tests a low-complexity reversal variant of the reviewed low-normalized selling-pressure family by giving the recent 20 day down-body pressure twice the weight of the slower 60 day persistence term. Higher values indicate repeated closes below opens relative to the daily low anchor, with a tilt toward more recent pressure that may mean revert over the evaluation horizon. This avoids discarded or crash-prone turnover-confirmation, low-rebound, downside-clipping, range-compression, and high-complexity OHLC-average ideas. The expression uses only allowed open, close, and low fields; allowed 20 and 60 day windows; and two allowed Mean operators."
