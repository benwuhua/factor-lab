name: price_turnover_divergence_20_5_v1
family: divergence
expression: "($close / Ref($close, 20) - 1) - (Mean($turnover, 5) / Mean($turnover, 20) - 1)"
direction: 1
description: "20 day price momentum net of short-term turnover expansion; quiet price advances rank higher than turnover-driven moves."
expected_behavior: "A stock that rises without a 5 day turnover surge versus its 20 day baseline may reflect steadier accumulation and lower crowding over the 20 day evaluation horizon."
