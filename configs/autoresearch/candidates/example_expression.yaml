name: smooth_low_open_anchor_reversion_60_5_v1
family: reversal
expression: "Mean($low, 60) / Mean($open, 5) - 1"
direction: 1
description: "Smoothed 60 day low-anchor reversion using recent opens; stocks whose 5 day average open sits below their 60 day average low rank higher."
expected_behavior: "Tests whether anchoring the recent leg on opening prices improves the reviewed low-anchor reversion family by reducing close-to-close noise while keeping the same low-complexity 60 and 5 day windows. It stays within allowed expression operators and avoids the discarded Min-based price-position, turnover-only, VWAP-anchor, volatility-scaled, range-normalized, and disallowed 0 or 1 day window ideas."
