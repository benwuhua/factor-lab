name: short_open_low_mid_discount_pressure_reversal_10_60_v1
family: reversal
expression: "Mean((($open+$low)/2-$close)/$low,10)+Mean(($open-$close)/$low,60)"
direction: 1
description: "10 day open-low midpoint discount reversal plus a 60 day low-normalized selling-pressure anchor."
expected_behavior: "Mean((($open+$low)/2-$close)/$low,10) rewards names whose closes have recently finished below the lower open-low midpoint, capturing short-term end-of-day selling pressure without volume, turnover, or volatility gates. Mean(($open-$close)/$low,60) keeps the reviewed medium-horizon low-normalized pressure anchor as a stabilizer. This tests a shorter discount memory than the reviewed 20/60 open-low midpoint candidate while avoiding the discarded intraday-shortfall, near-low, pure volatility, short-drawdown, and crash-prone turnover confirmation or turnover divergence paths. It uses only allowed open, low, and close fields; allowed 10 and 60 day windows; and two allowed Mean operators."
