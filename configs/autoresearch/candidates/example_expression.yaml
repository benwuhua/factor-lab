name: close_20d_high_drawdown_reversal_v1
family: reversal
expression: "Max($close,20)/$close-1"
direction: 1
description: "20 day close-to-high drawdown reversal; stocks trading farther below their recent highest close rank higher."
expected_behavior: "Tests a very low-complexity price-position reversal anchor that is distinct from the discarded turnover, pure low-volatility, intraday shortfall, and near-low pressure variants. Higher values mean the latest close is farther below the 20 day maximum close, which may capture short-term overreaction while avoiding the crowded low-normalized selling-pressure family. The expression uses only the allowed close field, the 20 day window, and the allowed Max operator."
