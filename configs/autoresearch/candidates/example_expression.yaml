name: open_norm_selling_pressure_reversal_20_60_v1
family: reversal
expression: "Mean(($open - $close) / $open, 20) + Mean(($open - $close) / $open, 60)"
direction: 1
description: "20 and 60 day open-normalized intraday selling-pressure reversal blend; stocks with repeated closes below open as a share of open rank higher."
expected_behavior: "Tests a low-complexity variant of the reviewed selling-pressure reversal family by normalizing the open-to-close body by open instead of close. Mean(($open - $close) / $open, 20) captures recent intraday selling pressure, while Mean(($open - $close) / $open, 60) captures persistent medium-term selling pressure. Higher values should favor names with repeated weak intraday closes that may be prone to reversal. The expression uses only allowed open and close fields, the allowed 20 and 60 day windows, and two rolling Mean operators."
