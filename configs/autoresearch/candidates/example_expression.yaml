name: prior_low_break_reversal_3_20_v1
family: reversal
expression: "0-Mean($close/Ref($low,3)-1,20)"
direction: 1
description: "20 day reversal signal for closes that trade weak relative to the low from three sessions earlier."
expected_behavior: "Tests a compact price-position reversal idea away from the heavily explored low-normalized intraday selling-pressure denominator variants. A high value means the current close has been persistently weak versus the low from three trading sessions earlier, capturing short-horizon prior-low breaks that may mean revert. This avoids the crashed turnover-confirmation and turnover-divergence paths, the discarded 60 day low-anchor proximity idea, the discarded open-to-low downside variant, and the discarded close-from-high standalone variant. The expression uses only allowed close and low fields, allowed 3 and 20 day windows, and allowed Ref and Mean operators."
