name: typical_price_mean_reversion_60_v1
family: reversal
expression: "(Mean($high, 60) + Mean($low, 60) + Mean($close, 60)) / ($close + $close + $close) - 1"
direction: 1
description: "60 day typical-price mean reversion; stocks with current closes below their medium-term high-low-close anchor rank higher."
expected_behavior: "Extends the reviewed 60 day close and high-low midpoint reversion ideas with one simple typical-price anchor, aiming to keep the neutralized medium-horizon reversal signal while avoiding range normalization and turnover filters that were discarded."
