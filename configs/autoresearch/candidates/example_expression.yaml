name: turnover_damped_open_norm_pressure_reversal_20_60_v1
family: reversal
expression: "Mean(($open-$close)/$open,20)/(1+Abs(Mean($turnover,20)/Mean($turnover,60)-1))"
direction: 1
description: "20 day open-normalized intraday selling pressure damped when recent turnover deviates from its 60 day baseline; persistent close-below-open pressure with ordinary turnover ranks higher than event-driven churn."
expected_behavior: "Extends the reviewed open-normalized selling-pressure reversal backbone with the compact turnover-stability denominator that worked on the low-normalized variant. Mean(($open-$close)/$open,20) rewards stocks that repeatedly close below open relative to a stable opening anchor, while 1+Abs(Mean($turnover,20)/Mean($turnover,60)-1) reduces scores when recent turnover is unusually high or low versus its medium-term norm. This avoids threshold If logic, direct turnover confirmation, volume or amount divergence legs, and the discarded downside-only, range-compression, short-drawdown, and pure turnover-volatility ideas. The expression uses only allowed open, close, and turnover fields; allowed 20 and 60 day windows; and allowed Mean and Abs operators."
