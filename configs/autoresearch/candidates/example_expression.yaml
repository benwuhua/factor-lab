name: short_drawdown_low_norm_pressure_reversal_5_20_v1
family: reversal
expression: "(Ref($close,5)/$close-1)+Mean(($open-$close)/$low,20)"
direction: 1
description: "5 day close-to-close drawdown plus 20 day low-normalized intraday selling-pressure reversal; stocks with recent price weakness and persistent closes below open rank higher."
expected_behavior: "Tests whether a compact close-to-close reversal leg can complement the reviewed low-normalized selling-pressure backbone without adding volume, turnover, threshold gates, or high-complexity OHLC composites. Ref($close,5)/$close-1 captures short horizon drawdown repair room, while Mean(($open-$close)/$low,20) retains the interpretable repeated intraday selling-pressure signal. This avoids the crashed turnover-confirmation path and the discarded downside-only, low-rebound, range-compression, pressure-volume divergence, pure volatility, and high-complexity composite ideas. The expression uses only allowed close, open, and low fields; allowed 5 and 20 day windows; and two allowed operators: Ref and Mean."
