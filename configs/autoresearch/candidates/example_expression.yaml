name: high_anchor_reversion_60_v1
family: reversal
expression: "Mean($high, 60) / $close - 1"
direction: 1
description: "60 day high-anchor reversion; stocks whose current close sits below their recent average high rank higher."
expected_behavior: "Tests a simple upper-price anchor distinct from discarded turnover, range-normalized, VWAP-anchor, and illegal-window ideas. The signal should retain the medium-horizon reversal interpretation of mean reversion while using the average high as a conservative reference for prior trading range pressure."
