name: mean_close_20d_reversal_v1
family: reversal
expression: "Mean($close,20)/$close-1"
direction: 1
description: "Smoothed 20 day close mean reversal; stocks trading below their recent average close rank higher."
expected_behavior: "This keeps the prior reviewed plain close reversal idea low-complexity while replacing the single 20 day Ref anchor with a 20 day Mean anchor. Mean($close,20)/$close-1 is positive when the current close is below its recent average, expressing a simple medium-horizon mean reversion hypothesis with less dependence on one lagged close. It avoids the discarded turnover confirmation and turnover divergence crash paths, discarded pure volatility and near-low variants, and high-complexity normalized divergence expressions. It uses only the allowed close field, the allowed 20 day window, and one allowed Mean operator."
