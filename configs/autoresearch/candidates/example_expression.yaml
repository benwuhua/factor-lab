name: smooth_open_anchor_reversion_60_5_v1
family: reversal
expression: "Mean($open, 60) / Mean($close, 5) - 1"
direction: 1
description: "Smoothed 60 day open-anchor reversion; stocks whose recent 5 day average close sits below their 60 day average open rank higher."
expected_behavior: "Blends the reviewed open-anchor reversion and smooth 60-to-5 mean reversion ideas, aiming to preserve the medium-horizon reversal signal while reducing one-day close noise and avoiding discarded turnover, range-normalized, VWAP-anchor, and disallowed 0 or 1 day window ideas."
