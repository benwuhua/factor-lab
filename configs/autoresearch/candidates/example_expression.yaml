name: medium_anchor_high_volume_divergence_reversal_20_60_v1
family: divergence
expression: "0-Corr($high/Mean($high,60),$volume/Mean($volume,20),20)+(Mean($high,60)-$close)/Mean($high,60)"
direction: 1
description: "20 day high-volume divergence using a 60 day mean-high price anchor and a 60 day mean-high discount reversal term."
expected_behavior: "Ranks stocks higher when highs relative to the stock's 60 day average high are weakly confirmed by recent volume, and when the close remains below that same 60 day average high. This keeps the productive high-discount volume-divergence interpretation while avoiding another slow 60 day correlation test, pure range-position reversal, pure volatility scaling, average-trade-price discount, or turnover-divergence path that recently underperformed, discarded, or crashed. The expression uses only allowed high, close, and volume fields with 20 and 60 day windows, four Mean calls, and one Corr call."
