name: low_oc_anchor_reversion_60_v1
family: reversal
expression: "(Mean($low, 60) + Mean($open, 60) + Mean($close, 60)) / ($close + $close + $close) - 1"
direction: 1
description: "60 day low-open-close anchor reversion; stocks whose current close sits below the average of recent lows, opens, and closes rank higher."
expected_behavior: "Extends the reviewed 60 day low/open/close anchor family with a simple three-price anchor instead of another smoothed variant. It keeps the strong low-anchor reversal component, adds opening-price anchoring that reviewed well, and avoids discarded turnover, VWAP, range-normalized, volatility-scaled, Min/Max price-position, and disallowed 0/1 day window ideas."
