name: high_norm_fast_price_volume_divergence_10_v1
family: divergence
expression: "0-Corr($high/Mean($high,10),$volume/Mean($volume,10),10)"
direction: 1
description: "10 day divergence between the high price normalized by its short mean and normalized volume."
expected_behavior: "A higher value means the 10 day rolling correlation between $high/Mean($high,10) and volume relative to its 10 day mean is lower or negative. The idea follows the reviewed high-anchor price-volume divergence branch, but tests a faster horizon for short-term price strength that is not confirmed by participation. It avoids turnover expressions that recently crashed and discarded intraday rebound, range-position, and pure volatility paths. It uses only allowed high and volume fields, the allowed 10 day window, and one Corr plus two Mean operators."
