name: low_anchor_weighted_high_ceiling_reversion_60_3_10_v1
family: reversal
expression: "Mean($low, 60) / ((Max($high, 3) + Max($high, 3) + Max($high, 10)) / 3) - 1"
direction: 1
description: "60 day low-anchor reversion measured against a recent-weighted high ceiling; stocks whose 3 and 10 day rebound highs remain close to their longer-run low anchor rank higher."
expected_behavior: "Extends the reviewed low-anchor dual-high-ceiling reversal family without repeating discarded turnover, VWAP, volatility-scaled, range-normalized, distance-from-low, upper-shadow, or disallowed-window ideas. The 60 day average low provides a stable downside anchor, while the denominator weights the 3 day maximum high twice and the 10 day maximum high once, emphasizing very recent rebound pressure without ignoring a broader recent ceiling. Higher values should favor names still compressed near their longer-run low after limited upside follow-through, using only allowed low/high fields, 3/10/60 windows, and simple rolling operators."
