name: steady_open_low_mid_pressure_reversal_20_60_v1
family: reversal
expression: "Mean((($open + $low) / 2 - $close) / (($open + $low) / 2), 60) - Std((($open + $low) / 2 - $close) / (($open + $low) / 2), 20)"
direction: 1
description: "Persistent close weakness versus the daily open-low midpoint, with a short-window stability penalty; stocks with steady downside closing pressure rank higher."
expected_behavior: "Tests whether the reviewed open-low midpoint pressure idea is stronger when it favors stable, persistent weakness instead of simply adding two horizons. The 60 day Mean captures repeated closes below the open-low midpoint, while the 20 day Std penalty downweights erratic one-off selloffs that may be less reliable. This stays distinct from discarded downside clipping, low-rebound, turnover-confirmation, and high-complexity OHLC-average variants, and it avoids the crash-prone window choices. Higher values should favor names with consistent weak closing location that may mean revert over the evaluation horizon. The expression uses only allowed open, low, and close fields; allowed 20 and 60 day windows; and the allowed Mean and Std operators."
