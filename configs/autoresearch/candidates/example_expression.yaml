name: smooth_mean_close_reversion_120_20_v1
family: reversal
expression: "Mean($close, 120) / Mean($close, 20) - 1"
direction: 1
description: "Long-horizon mean reversion using a 120 day close average against a 20 day smoothed recent price anchor."
expected_behavior: "Ranks stocks higher when their 20 day smoothed price is depressed versus the 120 day average, extending reviewed mean-reversion variants while avoiding discarded turnover, range-volatility, price-position, and disallowed 0 or 1 day window ideas."
