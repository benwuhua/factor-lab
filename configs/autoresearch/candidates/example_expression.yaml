name: high_norm_price_volume_divergence_20_v1
family: divergence
expression: "0-Corr($high/Mean($high,20),$volume/Mean($volume,20),20)"
direction: 1
description: "20 day divergence between high-normalized price strength and normalized volume."
expected_behavior: "A higher value means the rolling correlation between $high/Mean($high,20) and $volume/Mean($volume,20) is more negative, favoring stocks whose recent high-price strength is not being confirmed by volume. This extends the reviewed price-volume divergence family with a high-price anchor rather than close, open, low, or high-low midpoint anchors, while avoiding turnover-based divergence paths that have crashed and avoiding discarded volatility-only or near-low variants. The expression uses only allowed high and volume fields, the allowed 20 day window, and one Corr plus two Mean operators."
