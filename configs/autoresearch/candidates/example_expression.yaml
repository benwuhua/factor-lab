name: low_anchor_high_mean_ceiling_reversion_60_5_v1
family: reversal
expression: "Mean($low, 60) / ((Mean($high, 5) + Max($high, 5)) / 2) - 1"
direction: 1
description: "60 day low-anchor reversion measured against a recent 5 day high mean/ceiling blend; stocks whose recent upper prices remain close to their longer-run low anchor rank higher."
expected_behavior: "Blends two reviewed low-anchor reversal variants: the recent 5 day average high, which is smoother, and the 5 day maximum high ceiling, which is stricter about rebound attempts. The factor should preserve the same compressed-near-low interpretation while testing whether the midpoint denominator balances signal strength and turnover better than either high reference alone. It uses only allowed low/high fields, 60 and 5 day windows, and three simple operators, while avoiding discarded turnover, VWAP, volatility-scaled, range-normalized, distance-from-low, and disallowed-window ideas."
