name: low_norm_amount_divergence_reversal_20_60_v1
family: divergence
expression: "Mean(($open-$close)/$low,20)+Mean(($open-$close)/$low,60)-Corr($close,$amount,20)"
direction: 1
description: "20 and 60 day low-normalized intraday selling-pressure reversal adjusted by recent close-amount divergence; stocks with persistent weak closes and weaker traded-value confirmation rank higher."
expected_behavior: "Extends the reviewed low-normalized selling-pressure reversal family with one simple amount-based divergence term rather than repeating turnover confirmation or another mean-denominator tweak. The two Mean terms capture recent and persistent close-below-open pressure as a share of the session low. Subtracting Corr($close,$amount,20) favors names where traded value has not strongly confirmed price strength, preserving an exhaustion/reversal interpretation. The expression uses only allowed open, close, low, and amount fields; allowed 20 and 60 day windows; two Mean operators; and one Corr operator."
