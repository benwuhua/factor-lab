name: steady_low_norm_selling_pressure_reversal_20_60_v1
family: reversal
expression: "Mean(($open-$close)/$low,20)+Mean(($open-$close)/$low,60)-Std(($open-$close)/$low,20)"
direction: 1
description: "20 and 60 day low-normalized intraday selling-pressure reversal with a 20 day steadiness penalty; stocks with repeated close-below-open pressure and fewer one-off spikes rank higher."
expected_behavior: "Extends the reviewed low-normalized selling-pressure reversal with one simple volatility penalty rather than adding discarded turnover confirmation or high-complexity OHLC averaging. The two Mean terms capture recent and persistent close-below-open pressure as a share of the session low, while subtracting Std(($open-$close)/$low,20) favors steadier exhaustion over noisy single-day pressure. This keeps the economic premise interpretable: persistent weak closes near the lower price anchor may revert, but unstable pressure is penalized. The expression uses only allowed open, close, and low fields; allowed 20 and 60 day windows; two Mean operators; and one Std operator."
