name: smooth_hl_mid_reversion_60_5_v1
family: reversal
expression: "Mean((Mean($high, 60) + Mean($low, 60)) / ($close + $close) - 1, 5)"
direction: 1
description: "5 day smoothed reversal from the 60 day high-low average midpoint; stocks below the recent high-low center rank higher."
expected_behavior: "Combines the reviewed 60 day high-low midpoint reversion idea with short smoothing to preserve the medium-horizon reversal signal while lowering top-quantile turnover."
