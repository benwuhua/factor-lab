name: volume_weighted_low_norm_pressure_reversal_20_v1
family: reversal
expression: "Mean((($open - $close) / $low) * ($volume / Mean($volume, 20)), 20)"
direction: 1
description: "20 day low-normalized intraday selling pressure weighted by relative volume."
expected_behavior: "Tests whether close-below-open pressure is more informative when it occurs on above-normal volume. The down-body term (($open - $close) / $low) keeps the reviewed low-anchor reversal premise, while $volume / Mean($volume, 20) scales pressure by recent volume participation rather than using turnover or threshold gates. Higher values indicate repeated weak intraday closes with heavier relative trading, which may reflect capitulation and later mean reversion. This avoids discarded or crash-prone turnover-confirmation, low-rebound, downside-clipping, range-compression, and high-complexity OHLC-average ideas. The expression uses only allowed open, close, low, and volume fields; the allowed 20 day window; and two allowed Mean operators."
