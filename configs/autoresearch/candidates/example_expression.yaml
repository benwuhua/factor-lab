name: turnover_weighted_open_pressure_reversal_20_60_v1
family: divergence
expression: "Mean((($open - $close) / $open) * $turnover, 20) / Mean($turnover, 20) + Mean((($open - $close) / $open) * $turnover, 60) / Mean($turnover, 60)"
direction: 1
description: "20 and 60 day turnover-weighted open-to-close selling pressure; names whose weak closes occur on heavier turnover rank higher."
expected_behavior: "Tests whether open-to-close selling pressure is more informative when the down closes are concentrated on higher-turnover days. Each horizon averages (($open - $close) / $open) weighted by turnover and divides by the same horizon's average turnover, keeping the signal focused on turnover-conditioned pressure rather than raw liquidity. Higher values should favor names with persistent, high-participation intraday selling that may be prone to reversal. The expression uses only allowed open, close, and turnover fields, the allowed 20 and 60 day windows, and four rolling Mean operators."
