name: oc_mid_norm_selling_pressure_reversal_20_60_v1
family: reversal
expression: "Mean(($open-$close)/(($open+$close)/2),20)+Mean(($open-$close)/(($open+$close)/2),60)"
direction: 1
description: "20 and 60 day open-close-mid normalized intraday selling-pressure reversal."
expected_behavior: "Tests whether normalizing close-below-open selling pressure by the same-day open-close midpoint preserves the strong reviewed 20/60 selling-pressure reversal signal while reducing denominator dependence on any single price anchor. The factor stays low complexity with only open and close fields, allowed 20 and 60 day windows, and two Mean operators. It avoids previously discarded or crashed ideas based on turnover confirmation, downside clipping, range-body normalization, low rebound terms, and higher-complexity OHLC composites."
