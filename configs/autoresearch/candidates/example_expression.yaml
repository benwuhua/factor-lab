name: hybrid_low_open_norm_selling_pressure_reversal_20_60_v1
family: reversal
expression: "Mean(($open-$close)/$low,20)+Mean(($open-$close)/$open,60)"
direction: 1
description: "20 day low-normalized intraday selling pressure plus 60 day open-normalized pressure; stocks with recent weak closes near the low and persistent open-to-close pressure rank higher."
expected_behavior: "Combines two reviewed but not identical selling-pressure anchors without adding turnover confirmation, volume filters, or high-complexity OHLC composites. The 20 day term keeps the stronger low-normalized exhaustion signal by scaling close-below-open pressure against the session low. The 60 day term uses the open as a more stable medium-horizon denominator, reducing dependence on persistent low-price anchoring while preserving the reversal interpretation. The expression uses only allowed open, close, and low fields; allowed 20 and 60 day windows; and two allowed Mean operators."
