name: low_anchor_recent_hc_mid_reversion_60_5_v1
family: reversal
expression: "Mean($low, 60) / ((Mean($high, 5) + Mean($close, 5)) / 2) - 1"
direction: 1
description: "60 day low-anchor reversion measured against the recent 5 day high/close midpoint; stocks whose recent upper-session price remains depressed versus their longer-run low anchor rank higher."
expected_behavior: "Tests a simple blend of two reviewed short-term denominators in the low-anchor reversal family: recent highs, which had strong neutral Rank IC, and recent closes, which provide a less extreme traded-price anchor. The signal uses only allowed 5 and 60 day windows, keeps complexity low, and avoids previously discarded turnover, VWAP, volatility-scaled, range-normalized, Min/Max price-position, and disallowed 0/1 day window ideas."
