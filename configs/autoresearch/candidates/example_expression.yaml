name: low_anchor_recent_ohlc_reversion_60_5_v1
family: reversal
expression: "Mean($low, 60) / Mean(($open + $high + $low + $close) / 4, 5) - 1"
direction: 1
description: "60 day low-anchor reversion measured against the recent 5 day OHLC average; stocks whose recent composite price is closer to their longer-run low anchor rank higher."
expected_behavior: "Tests whether replacing single-field or two-field recent anchors with a simple 5 day OHLC composite preserves the reviewed low-anchor reversal signal while reducing dependence on any one intraday price. The candidate uses only allowed fields, the 60 and 5 day windows, and avoids discarded turnover, VWAP, volatility-scaled, range-normalized, and crash-inducing window choices."
