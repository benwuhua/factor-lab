name: low_anchor_high_mean_ceiling_reversion_60_3_v1
family: reversal
expression: "Mean($low, 60) / ((Mean($high, 3) + Max($high, 3)) / 2) - 1"
direction: 1
description: "60 day low-anchor reversion measured against a recent 3 day high mean/ceiling blend; stocks whose recent upper prices remain close to their longer-run low anchor rank higher."
expected_behavior: "Blends two reviewed low-anchor reversal references on a shorter recent window: the 3 day average high, which captures recent rebound level, and the 3 day maximum high ceiling, which penalizes sharper near-term bounces. The factor should retain the compressed-near-low interpretation while testing whether a shorter high reference improves responsiveness without materially increasing turnover. It uses only allowed low/high fields, 60 and 3 day windows, and three simple rolling operators, while avoiding discarded turnover, VWAP, volatility-scaled, range-normalized, distance-from-low, and disallowed-window ideas."
