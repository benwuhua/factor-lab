name: upper_wick_volume_divergence_high_discount_reversal_20_60_v1
family: divergence
expression: "0-Corr(($high-$close)/$close,$volume/Mean($volume,20),20)+(Mean($high,60)-$close)/$close"
direction: 1
description: "20 day upper-wick pressure versus volume divergence with a 60 day mean-high discount reversal term."
expected_behavior: "Ranks stocks higher when intraday upper-wick pressure is weakly confirmed by normalized volume over 20 days, and when the close remains below the stock's 60 day average high. This keeps the reviewed high-discount reversal anchor but changes the divergence leg from normalized high levels to close-relative upper wick pressure, avoiding the repeated volume/amount high-level variants and the crashed turnover-divergence pattern. The expression uses only allowed high, close, and volume fields with 20 and 60 day windows, two Mean calls, and one Corr call."
