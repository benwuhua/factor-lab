name: low_open_anchor_reversion_60_v1
family: reversal
expression: "Mean($low, 60) / $open - 1"
direction: 1
description: "60 day low-anchor reversion measured against the current open; stocks opening below their longer-run low anchor rank higher."
expected_behavior: "Extends the reviewed low-anchor reversal family by using the current open as the price denominator rather than the close or a smoothed close. The factor stays low complexity, uses only the allowed 60 day window, and avoids previously discarded turnover, VWAP, volatility-scaled, range-normalized, Min/Max price-position, and disallowed 0/1 day window ideas."
