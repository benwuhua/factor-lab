name: low_anchor_lagged_close_reversion_60_5_v1
family: reversal
expression: "Mean($low, 60) / Mean(Ref($close, 5), 5) - 1"
direction: 1
description: "60 day low-anchor reversion measured against a lagged 5 day average close; stocks whose prior-week close level sat below their longer-run low anchor rank higher."
expected_behavior: "Tests whether the reviewed low-anchor reversal family benefits from using a slower lagged close denominator instead of same-day or immediately recent close anchors. The lagged 5 day denominator should reduce sensitivity to current-day noise while staying low complexity and avoiding previously discarded turnover, VWAP, volatility-scaled, range-normalized, Min/Max price-position, and disallowed 0/1 day window ideas."
