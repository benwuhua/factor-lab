name: hybrid_open_low_norm_selling_pressure_reversal_20_60_v1
family: reversal
expression: "Mean(($open - $close) / $open, 20) + Mean(($open - $close) / $low, 60)"
direction: 1
description: "Reverse hybrid open and low normalized intraday selling pressure reversal over 20 and 60 day horizons."
expected_behavior: "Tests whether recent close-below-open pressure is cleaner when scaled by the stable open anchor, while persistent 60 day pressure keeps the more stress-sensitive low anchor. Higher values indicate sustained intraday selling pressure that may mean revert over the evaluation horizon. This is distinct from the prior low-then-open hybrid, avoids discarded or crash-prone turnover-confirmation, downside-clipping, low-rebound, range-compression, high-pullback, and high-complexity OHLC-average ideas, and uses only allowed open, close, and low fields; allowed 20 and 60 day windows; and two allowed Mean operators."
