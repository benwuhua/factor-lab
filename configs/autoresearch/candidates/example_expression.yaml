name: low_anchor_recent_high_reversion_60_3_v1
family: reversal
expression: "Mean($low, 60) / Mean($high, 3) - 1"
direction: 1
description: "60 day low-anchor reversion measured against the recent 3 day high; stocks whose short-term highs remain close to their longer-run low anchor rank higher."
expected_behavior: "Tests whether a faster 3 day recent-high denominator preserves the reviewed low-anchor reversal signal while improving responsiveness versus the prior 5, 10, and 20 day variants. The expression uses only allowed low and high fields with 60 and 3 day windows, stays very low complexity, and avoids previously discarded turnover, VWAP, volatility-scaled, range-normalized, distance-from-low, and disallowed-window ideas."
