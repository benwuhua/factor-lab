name: intraday_position_volume_divergence_20_v1
family: divergence
expression: "0-Corr(($close-$low)/($high-$low),$volume/Mean($volume,20),20)"
direction: 1
description: "20 day divergence between intraday close position and normalized volume."
expected_behavior: "Tests whether high volume aligned with weaker intraday closes marks selling exhaustion and subsequent reversal. Higher values mean the close's position within the daily high-low range is less confirmed by volume over 20 days. This is distinct from prior normalized price-volume divergence because it uses intraday price position rather than close level, and it avoids discarded downside, low-rebound, turnover-confirmation, range-compression, and high-complexity OHLC composite ideas. The expression uses allowed high, low, close, and volume fields, the allowed 20 day window, one Corr operator, and one Mean operator."
