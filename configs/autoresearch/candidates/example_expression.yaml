name: low_anchor_reversion_60_v1
family: reversal
expression: "Mean($low, 60) / $close - 1"
direction: 1
description: "60 day low-anchor reversion; stocks whose current close is depressed toward their recent average low rank higher."
expected_behavior: "Tests a simple lower-price anchor that complements reviewed close, open, midpoint, and high-anchor reversion variants while staying distinct from the discarded Min-based distance-from-low idea. The signal should preserve the medium-horizon reversal interpretation without adding turnover, volatility scaling, range normalization, or disallowed windows."
