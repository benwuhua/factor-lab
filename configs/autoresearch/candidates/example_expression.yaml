name: low_norm_short_persistent_selling_pressure_reversal_10_60_v1
family: reversal
expression: "Mean(($open-$close)/$low,10)+Mean(($open-$close)/$low,60)"
direction: 1
description: "10 and 60 day low-normalized intraday selling-pressure reversal."
expected_behavior: "Tests whether a faster 10 day low-normalized close-below-open pressure leg can improve the reviewed 20/60 low_norm_selling_pressure_reversal backbone while keeping the persistent 60 day component. The factor stays low complexity with only open, close, and low fields; allowed 10 and 60 day windows; and two Mean operators. It avoids previously discarded or crashed ideas based on turnover confirmation, downside clipping, range-body normalization, low rebound terms, and higher-complexity OHLC composites."
