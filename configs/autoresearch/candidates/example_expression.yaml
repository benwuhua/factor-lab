name: low_anchor_oc_mid_reversion_60_v1
family: reversal
expression: "Mean($low, 60) / (($open + $close) / 2) - 1"
direction: 1
description: "60 day low-anchor reversion measured against the current open/close midpoint; stocks trading below their longer-run low anchor on a blended intraday price rank higher."
expected_behavior: "Extends the reviewed low-anchor reversal family by replacing the single close or open denominator with the current open/close midpoint. This keeps the expression low complexity, uses only the allowed 60 day window, and avoids previously discarded turnover, VWAP, volatility-scaled, range-normalized, Min/Max price-position, and disallowed 0/1 day window ideas."
