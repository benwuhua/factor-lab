name: medium_close_drawdown_midpoint_discount_reversal_20_v1
family: reversal
expression: "Ref($close,20)/$close-1+Mean((($open+$low)/2-$close)/$low,20)"
direction: 1
description: "20 day close-to-close drawdown reversal plus a 20 day open-low midpoint discount pressure term."
expected_behavior: "Ref($close,20)/$close-1 rewards medium-horizon price drawdowns with clear reversal interpretation, while Mean((($open+$low)/2-$close)/$low,20) adds a low-normalized measure of repeated closes below the open-low midpoint. The candidate avoids turnover and turnover-divergence paths that have crashed, avoids pure volatility and near-60-day-low ideas that were discarded, and keeps complexity below prior multi-anchor pressure variants. It uses only allowed open, low, and close fields; the allowed 20 day window; and allowed Ref and Mean operators."
