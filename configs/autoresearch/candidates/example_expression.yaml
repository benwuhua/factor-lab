name: low_turnover_high_mean_discount_reversal_20_60_v1
family: turnover
expression: "(Mean($high,60)-$close)/$close+(Mean($turnover,20)-$turnover)/Mean($turnover,20)"
direction: 1
description: "60 day mean-high discount reversal reinforced by below-normal 20 day turnover."
expected_behavior: "Ranks stocks higher when the close is below the stock's 60 day average high and current turnover is below its 20 day average. The first term keeps the interpretable high-discount reversal anchor that has recently reviewed well, while the second term favors uncrowded rebounds without using turnover correlation, avoiding the recent turnover-divergence crash pattern. The expression uses only allowed high, close, and turnover fields with 20 and 60 day windows and simple Mean operations."
