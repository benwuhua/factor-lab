name: fast_typical_price_volume_divergence_10_v1
family: divergence
expression: "0-Corr((($high+$low+$close)/3)/Mean(($high+$low+$close)/3,10),$volume/Mean($volume,10),10)"
direction: 1
description: "10 day divergence between normalized typical price strength and normalized traded volume."
expected_behavior: "A higher value means the short-window correlation between the typical price proxy, (high plus low plus close)/3, and traded volume is more negative. This favors stocks whose recent broad intraday price level is not being confirmed by volume, extending the reviewed price-volume divergence family with a faster balanced OHLC proxy while avoiding the crashed turnover-divergence path and discarded range-position ideas. The expression uses only allowed high, low, close, and volume fields, the allowed 10 day window, and one Corr plus two Mean operators."
