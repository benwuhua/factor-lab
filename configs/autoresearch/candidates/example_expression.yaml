name: range_normalized_selling_pressure_reversal_60_v1
family: reversal
expression: "Mean($open - $close, 60) / Mean($high - $low, 60)"
direction: 1
description: "60 day persistent intraday selling-pressure reversal normalized by the average daily high-low range; stocks with larger down bodies relative to their normal range rank higher."
expected_behavior: "Builds on the reviewed selling-pressure reversal branch while avoiding another low-anchor or ceiling variation. Mean($open - $close, 60) measures sustained tendency to close below the open, and Mean($high - $low, 60) scales that pressure by each stock's typical trading range rather than by price level. Higher values should favor names with persistent range-adjusted selling pressure that may be prone to reversal. The expression uses only allowed open, close, high, and low fields, the allowed 60 day window, and two rolling Mean operators."
