name: persistent_steady_open_pressure_reversal_60_20_v1
family: reversal
expression: "Mean(($open - $close) / $open, 60) - Std(($open - $close) / $open, 20)"
direction: 1
description: "Persistent open-normalized intraday selling pressure with a short-window stability penalty; stocks with steady closes below open rank higher."
expected_behavior: "Tests a lower-complexity stability variant of the reviewed open-normalized selling-pressure family. The 60 day Mean captures persistent closes below open as a share of open, while the 20 day Std penalty downweights erratic one-off selloff spikes that may be less reliable. This is distinct from the prior two-Mean open-pressure blend because it removes the short-horizon level term and asks whether durable, steady pressure is sufficient. It also avoids the discarded downside clipping, low-rebound, direct turnover weighting, and high-complexity OHLC-average variants. Higher values should favor names with consistent intraday selling pressure that may mean revert over the evaluation horizon. The expression uses only allowed open and close fields; allowed 20 and 60 day windows; and the allowed Mean and Std operators."
