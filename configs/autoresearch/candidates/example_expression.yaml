name: low_anchor_high_ceiling_reversion_60_20_v1
family: reversal
expression: "Mean($low, 60) / Max($high, 20) - 1"
direction: 1
description: "60 day low-anchor reversion measured against the recent 20 day high ceiling; stocks whose one-month rebound ceiling remains close to their longer-run low anchor rank higher."
expected_behavior: "Extends the reviewed low-anchor high-ceiling reversal family with a still-simple 20 day rebound ceiling rather than repeating discarded turnover, VWAP, volatility-scaled, range-normalized, distance-from-low, upper-shadow, or disallowed-window ideas. The 60 day average low provides a stable downside anchor, while Max($high, 20) requires the whole recent month of high prices to remain compressed before the factor ranks a stock strongly. Higher values should favor names still near their longer-run low after a broader recent rebound window, using only allowed low/high fields, 20/60 windows, and two simple rolling operators."
