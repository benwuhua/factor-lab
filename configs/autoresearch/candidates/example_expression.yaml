name: close_norm_selling_pressure_reversal_20_60_v1
family: reversal
expression: "Mean(($open-$close)/$close,20)+Mean(($open-$close)/$close,60)"
direction: 1
description: "20 day plus 60 day close-normalized intraday selling pressure; stocks that repeatedly close below the open relative to their close rank higher."
expected_behavior: "Tests the same persistent close-below-open selling-pressure reversal family as the reviewed open-, low-, high-, and HL-mid-normalized variants, but uses close as the price scale. Higher values indicate sustained intraday selling pressure normalized by the terminal traded price, which may capture short-term exhaustion without adding volume, turnover, thresholds, or composite anchors. The expression uses only allowed open and close fields; allowed 20 and 60 day windows; and two allowed Mean operators."
