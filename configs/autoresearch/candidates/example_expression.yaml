name: low_anchor_recent_hl_mid_reversion_60_5_v1
family: reversal
expression: "Mean($low, 60) / Mean(($high + $low) / 2, 5) - 1"
direction: 1
description: "60 day low-anchor reversion measured against the recent 5 day high-low midpoint; stocks trading closer to their longer-run low anchor rank higher after smoothing intraday extremes."
expected_behavior: "Tests a balanced recent price anchor between the previously reviewed recent-high and high-close/open-mid variants. Using the 5 day high-low midpoint should preserve the low-anchor reversal signal while reducing dependence on a single extreme high print, with only allowed fields and windows and without repeating discarded turnover, VWAP, volatility-scaled, range-normalized, or crash-inducing window choices."
