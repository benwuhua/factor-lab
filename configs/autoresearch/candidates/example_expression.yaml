name: gap5_low_close_pressure_reversal_5_20_60_v1
family: reversal
expression: "Mean(($open-$close)/$low,20)+Mean(($open-$close)/$close,60)-Mean($open/Ref($close,5)-1,20)"
direction: 1
description: "Low-normalized 20 day selling pressure plus a 60 day close-normalized pressure anchor, adjusted by five-session open weakness versus the prior close."
expected_behavior: "Tests whether the reviewed low/close selling-pressure reversal backbone benefits from a slightly slower 5 day open-gap anchor instead of the prior 3 day gap variant. Mean(($open-$close)/$low,20) rewards recent close-below-open pressure on a low-price scale, Mean(($open-$close)/$close,60) captures persistent closing weakness on a return-like scale, and subtracting Mean($open/Ref($close,5)-1,20) favors names whose current opens remain weak versus the close five sessions earlier. This stays away from the discarded pure volatility, downside-only, near-60-day-low, direct range-position, and crash-prone turnover-confirmation ideas while using only allowed fields, windows, and operators."
