name: dual_horizon_selling_pressure_reversal_20_60_v1
family: reversal
expression: "(Mean($open - $close, 20) + Mean($open - $close, 60)) / Mean($close, 60)"
direction: 1
description: "20 and 60 day intraday selling-pressure reversal blend; stocks with both recent and persistent down bodies scaled by medium-term price rank higher."
expected_behavior: "Blends two reviewed selling-pressure horizons without adding another low-anchor, high-ceiling, range-normalized, turnover, volatility-scaled, VWAP, distance-from-low, upper-shadow, or disallowed-window variant. Mean($open - $close, 20) captures recent down-body pressure, Mean($open - $close, 60) captures persistent session-level selling, and Mean($close, 60) scales the combined pressure by price level. Higher values should favor names with both short-term and medium-term intraday selling pressure that may be prone to reversal. The expression uses only allowed open and close fields, the allowed 20 and 60 day windows, and three rolling Mean operators."
