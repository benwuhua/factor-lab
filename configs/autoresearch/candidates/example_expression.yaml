name: overnight_gap_reversal_10_v1
family: reversal
expression: "Mean(Ref($close, 1) / $open - 1, 10)"
direction: 1
description: "10 day overnight gap reversal; stocks opening below the prior close rank higher, using only open and previous close information."
expected_behavior: "Averaging recent overnight gaps should capture short-horizon overreaction from gap-down opens while avoiding the already tested intraday close/open reversal and keeping turnover moderate."
