name: smooth_high_anchor_reversion_60_5_v1
family: reversal
expression: "Mean($high, 60) / Mean($close, 5) - 1"
direction: 1
description: "Smoothed 60 day high-anchor reversion; stocks whose recent 5 day average close sits below their 60 day average high rank higher."
expected_behavior: "Extends the reviewed 60 day high-anchor reversal by replacing the latest close with a 5 day average close to reduce single-day noise while preserving a simple medium-term reversion signal. It uses only allowed 60 and 5 day windows and avoids the discarded Min-based price-position, turnover-only, VWAP-anchor, volatility-scaled, range-normalized, and disallowed 0 or 1 day window ideas."
