name: low_anchor_selling_pressure_adjusted_reversion_60_20_v1
family: reversal
expression: "Mean($low, 60) / ($close - Mean($open - $close, 20)) - 1"
direction: 1
description: "60 day low-anchor reversal with a 20 day intraday selling-pressure adjustment; stocks near their longer-run low anchor after repeated closes below opens rank higher."
expected_behavior: "Combines two reviewed low-complexity reversal ideas without repeating the discarded range-normalized selling-pressure, turnover, volatility-scaled, VWAP, distance-from-low, upper-shadow, or disallowed-window variants. Mean($low, 60) supplies a stable downside anchor, while subtracting Mean($open - $close, 20) from the current close lifts the score when recent intraday bodies show persistent selling pressure and lowers it when closes have been firm. Higher values should favor compressed names that remain close to their 60 day low anchor and still show short-term sell-pressure exhaustion. The expression uses only allowed open/close/low fields, 20/60 windows, and two rolling Mean operators."
