name: selling_pressure_acceleration_20_60_v1
family: reversal
expression: "Mean(($open - $close) / $open, 20) - Mean(($open - $close) / $open, 60)"
direction: 1
description: "Recent open-to-close selling pressure relative to its 60 day baseline, targeting short-term pressure acceleration and reversal."
expected_behavior: "Tests whether names with 20 day open-to-close weakness that is elevated versus their own 60 day baseline are more likely to mean revert. The signal is positive when recent closes are weak versus opens faster than the longer baseline, while persistent stale pressure is subtracted out. This keeps the successful open-normalized selling pressure family but removes the downside clipping that crashed or discarded recent variants, using only allowed open and close fields, allowed 20 and 60 windows, and two Mean operators."
