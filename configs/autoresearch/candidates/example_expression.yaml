name: quiet_mean_reversion_60_v1
family: reversal
expression: "If(Less(Mean($turnover, 20), Mean($turnover, 60)), Mean($close, 60) / $close - 1, 0)"
direction: 1
description: "60 day close mean reversion gated by quiet turnover; stocks below their 60 day average close rank higher only when recent turnover is below its 60 day baseline."
expected_behavior: "Tests whether a simple liquidity calm filter preserves the reviewed 60 day mean reversion edge while reducing noisy high-turnover reversal exposure."
