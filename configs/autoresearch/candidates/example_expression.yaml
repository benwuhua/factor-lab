name: slow_close_volume_divergence_60_v1
family: divergence
expression: "Corr($close,$volume,60)"
direction: -1
description: "60 day close-volume correlation used as an inverse divergence signal; stocks with weaker price-volume confirmation rank higher."
expected_behavior: "Isolates the simple divergence component that recent reviewed candidates used only as an add-on to selling-pressure terms. A lower 60 day correlation between close and volume suggests price moves are less confirmed by participation, which may indicate exhaustion rather than trend continuation. Using direction -1 ranks weaker close-volume confirmation higher while keeping the expression very low complexity. This avoids the discarded turnover, pure low-volatility, upper-shadow, low-rebound, and disallowed overnight-gap ideas. The expression uses only allowed close and volume fields, the allowed 60 day window, and one Corr operator."
