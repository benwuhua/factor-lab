name: low_anchor_recent_close_reversion_60_5_v1
family: reversal
expression: "Mean($low, 60) / Mean($close, 5) - 1"
direction: 1
description: "60 day low-anchor reversion measured against the recent 5 day average close; stocks trading below their longer-run low anchor rank higher after smoothing short-term close noise."
expected_behavior: "Extends the reviewed low-anchor reversal family with a simple recent-close denominator rather than current single-day or OHLC anchors. The 5 day denominator should reduce turnover versus unsmoothed anchors while staying low complexity and avoiding previously discarded turnover, VWAP, volatility-scaled, range-normalized, Min/Max price-position, and disallowed 0/1 day window ideas."
