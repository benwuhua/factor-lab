name: intraday_return_shortfall_reversal_20_v1
family: reversal
expression: "Mean($close/$open-1,20)-($close/$open-1)"
direction: 1
description: "Intraday return shortfall reversal; stocks whose current close/open return is below their recent intraday average rank higher."
expected_behavior: "This tests a simple intraday underperformance mean-reversion signal. Mean($close/$open-1,20)-($close/$open-1) is positive when today's close/open return is weaker than the stock's own 20 day intraday return baseline, favoring names with unusually poor same-day intraday action for a subsequent reversal. It stays low-complexity with only open and close, the allowed 20 day window, and one allowed Mean operator. It avoids the discarded pure volatility, near-low, and high-complexity normalized divergence paths, and it avoids the turnover confirmation/divergence expressions that previously crashed."
