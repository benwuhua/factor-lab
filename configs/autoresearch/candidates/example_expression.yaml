name: volume_damped_low_norm_pressure_reversal_20_60_v1
family: reversal
expression: "Mean(($open-$close)/$low,20)/(1+Abs(Mean($volume,20)/Mean($volume,60)-1))"
direction: 1
description: "20 day low-normalized intraday selling pressure damped when recent volume deviates from its 60 day baseline."
expected_behavior: "Tests whether the reviewed low-normalized selling-pressure reversal is cleaner when event-like volume surges or droughts are softly penalized. Mean(($open-$close)/$low,20) rewards repeated closes below open relative to the session low, while 1+Abs(Mean($volume,20)/Mean($volume,60)-1) reduces scores for names whose recent volume is far from its medium-term norm. This differs from prior volume-weighted and price-volume divergence candidates by using volume only as a stability dampener, avoids the crashed turnover-confirmation path, and avoids discarded pure volatility, downside-only, low-rebound, near-low, and range-compression ideas. The expression uses only allowed open, close, low, and volume fields; allowed 20 and 60 day windows; and allowed Mean and Abs operators."
