name: smoothed_open_norm_selling_pressure_reversal_20_60_v1
family: reversal
expression: "Mean($open-$close,20)/Mean($open,20)+Mean($open-$close,60)/Mean($open,60)"
direction: 1
description: "20 and 60 day smoothed open-normalized intraday selling-pressure reversal; stocks with persistent close-below-open bodies relative to their average open price rank higher."
expected_behavior: "Tests a low-complexity ratio-of-means variant of the reviewed open-normalized selling-pressure reversal family. Using Mean($open-$close,N)/Mean($open,N) keeps the same interpretation as close-below-open pressure but smooths the denominator before normalization, which may reduce daily price-scale noise compared with averaging per-day ratios. Direction is positive because persistent selling pressure is treated as a reversal setup. The expression uses only allowed open and close fields, 20 and 60 day windows, and four Mean operators, with no turnover confirmation branch or disallowed short window."
