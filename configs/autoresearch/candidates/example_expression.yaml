name: pct_selling_pressure_reversal_20_60_v1
family: reversal
expression: "Mean(($open - $close) / $close, 20) + Mean(($open - $close) / $close, 60)"
direction: 1
description: "20 and 60 day percent intraday selling-pressure reversal blend; stocks with both recent and persistent down bodies as a share of close rank higher."
expected_behavior: "Tests whether the reviewed selling-pressure reversal family is cleaner when each daily candle body is normalized by that day close before averaging, instead of scaling raw bodies by a medium-term close mean. Mean(($open - $close) / $close, 20) captures recent percent down-body pressure, while the 60 day term captures persistent session-level selling pressure. Higher values should favor names with sustained intraday selling pressure that may be prone to reversal. The expression uses only allowed open and close fields, the allowed 20 and 60 day windows, and two rolling Mean operators."
