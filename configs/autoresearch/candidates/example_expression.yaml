name: hybrid_low_close_norm_selling_pressure_reversal_20_60_v1
family: reversal
expression: "Mean(($open - $close) / $low, 20) + Mean(($open - $close) / $close, 60)"
direction: 1
description: "Hybrid low and close normalized intraday selling pressure reversal over 20 and 60 day horizons."
expected_behavior: "Tests a low-complexity hybrid of the reviewed low-normalized and close-normalized selling-pressure reversal families. The 20 day term keeps the stronger recent capitulation signal by scaling close-below-open bodies against the daily low anchor, while the 60 day term uses the close as a stable persistence scale instead of another low anchor. Higher values indicate repeated intraday selling pressure that may mean revert over the evaluation horizon. This avoids discarded or crash-prone turnover-confirmation, downside-clipping, low-rebound, range-compression, high-pullback, and high-complexity OHLC-average ideas. The expression uses only allowed open, close, and low fields; allowed 20 and 60 day windows; and two allowed Mean operators."
