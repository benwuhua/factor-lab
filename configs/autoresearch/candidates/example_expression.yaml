name: open_low_mid_dual_anchor_pressure_reversal_20_60_120_v1
family: reversal
expression: "Mean((($open+$low)/2-$close)/$low,20)+Mean(($open-$close)/$low,60)+Mean(($open-$close)/$low,120)"
direction: 1
description: "20 day open-low midpoint discount reversal with 60 and 120 day low-normalized selling-pressure anchors."
expected_behavior: "Mean((($open+$low)/2-$close)/$low,20) rewards names whose closes persistently finish below the lower intraday open-low midpoint, capturing weak end-of-day price position on a simple low-normalized scale. The 60 day Mean(($open-$close)/$low,60) keeps the reviewed medium-horizon selling-pressure anchor, while the 120 day Mean(($open-$close)/$low,120) adds a slower memory as a secondary stabilizer rather than replacing the 60 day leg. This tests whether the reviewed open-low midpoint discount idea benefits from a dual medium/slow pressure anchor while avoiding the discarded intraday shortfall, pure volatility, near-low, high-complexity normalized-divergence, and crashed turnover-divergence paths. It uses only allowed open, low, and close fields; allowed 20, 60, and 120 day windows; and three allowed Mean operators."
