name: near_60d_low_low_norm_pressure_reversal_20_60_v1
family: price_position
expression: "Mean(($open-$close)/$low,20)-($close/Min($low,60)-1)"
direction: 1
description: "20 day low-normalized selling pressure with a simple 60 day low-distance price-position adjustment."
expected_behavior: "Tests whether the reviewed low-normalized intraday selling-pressure reversal signal is stronger when the current close remains near its 60 day low. A high value means closes have tended to finish below opens relative to the low-price scale, while the stock is not far above the trailing 60 day low, preserving a straightforward capitulation-and-reversion interpretation. This avoids repeating the discarded volatility damping idea, direct upper-shadow and downside-only variants, volume or amount divergence confirmations, and crash-prone turnover confirmation. The expression uses only allowed open, close, and low fields; allowed 20 and 60 day windows; and allowed Mean and Min operators."
