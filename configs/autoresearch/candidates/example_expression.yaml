name: steady_open_pressure_reversal_20_60_v1
family: reversal
expression: "Mean(($open - $close) / $open, 20) + Mean(($open - $close) / $open, 60) - Std(($open - $close) / $open, 20)"
direction: 1
description: "20 and 60 day open-normalized intraday selling pressure with a 20 day consistency penalty; stocks with persistent, less erratic weak closes rank higher."
expected_behavior: "Keeps the reviewed open-normalized selling-pressure reversal backbone while avoiding the crashed turnover confirmation variant. The two Mean terms capture recent and persistent close-below-open pressure as a share of open, while subtracting Std(($open - $close) / $open, 20) penalizes one-off noisy pressure spikes and favors steadier exhaustion. This avoids discarded downside clipping, low-rebound, direct turnover weighting, and high-complexity OHLC mean variants. The expression uses only allowed open and close fields, allowed 20 and 60 day windows, two Mean operators, and one Std operator."
