name: turnover_damped_open_low_mid_norm_pressure_reversal_20_60_v1
family: turnover
expression: "Mean(($open-$close)/(($open+$low)/2),20)/(1+Abs(Mean($turnover,20)/Mean($turnover,60)-1))"
direction: 1
description: "20 day open-low-mid normalized intraday selling pressure damped when recent turnover deviates from its 60 day baseline."
expected_behavior: "Tests whether the reviewed open-low-mid normalized selling-pressure reversal benefits from the same soft turnover stability penalty that worked on the simpler low-normalized pressure form. Mean(($open-$close)/(($open+$low)/2),20) rewards repeated close-below-open pressure scaled by a conservative intraday price anchor, while 1+Abs(Mean($turnover,20)/Mean($turnover,60)-1) reduces scores for names whose recent turnover is far from its medium-term norm. This is not a hard turnover confirmation, avoiding the prior crashed turnover-confirmed path, and it avoids discarded pure volatility, downside-only, rebound-from-low, near-low, and range-compression ideas while keeping the expression low complexity. The expression uses only allowed open, close, low, and turnover fields; allowed 20 and 60 day windows; and allowed Mean and Abs operators."
