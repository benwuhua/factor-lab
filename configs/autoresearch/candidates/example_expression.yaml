name: high_60d_discount_amount_divergence_reversal_20_60_v1
family: divergence
expression: "0-Corr($high/Mean($high,20),$amount/Mean($amount,20),20)+(Mean($high,60)-$close)/Mean($high,60)"
direction: 1
description: "20 day high-price versus amount divergence with a 60 day mean-high discount reversal term."
expected_behavior: "Ranks stocks higher when normalized highs are weakly confirmed by normalized traded amount, while adding a medium-horizon reversal tilt for names whose close sits below the 60 day mean high. This keeps the productive high-discount divergence structure but tests traded amount as a liquidity confirmation channel instead of repeating the prior volume, turnover-divergence, range-position, or volatility-damped variants. The expression uses only allowed high, close, and amount fields with 20 and 60 day windows, four Mean calls, and one Corr call."
