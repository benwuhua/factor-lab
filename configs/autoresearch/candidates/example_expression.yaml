name: smooth_hl_mid_reversion_60_20_v1
family: reversal
expression: "(Mean($high, 60) + Mean($low, 60)) / (Mean($close, 20) + Mean($close, 20)) - 1"
direction: 1
description: "60 day high-low midpoint reversion against a 20 day average close; stocks with recent prices below the medium-term range center rank higher."
expected_behavior: "Combines two reviewed low-complexity ideas: the 60 day high-low midpoint anchor and 20 day close smoothing, aiming to preserve neutralized medium-horizon reversal while reducing single-day noise and turnover."
