name: low_anchor_recent_ho_mid_reversion_60_5_v1
family: reversal
expression: "Mean($low, 60) / ((Mean($high, 5) + Mean($open, 5)) / 2) - 1"
direction: 1
description: "60 day low-anchor reversion measured against the recent 5 day high/open midpoint; stocks whose recent upper-session and opening prices remain depressed versus their longer-run low anchor rank higher."
expected_behavior: "Extends the reviewed low-anchor reversal family with a new short-term high/open midpoint denominator. The high leg preserves the strong recent-high anchor seen in prior review candidates, while the open leg adds a traded session-start anchor without using disallowed 0/1 day windows or previously discarded turnover, VWAP, volatility-scaled, range-normalized, and Min/Max price-position ideas."
