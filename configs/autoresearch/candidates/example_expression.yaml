name: turnover_stability_low_norm_pressure_reversal_20_60_v1
family: turnover
expression: "Mean(($open-$close)/$low,20)/(1+Abs(Mean($turnover,20)/Mean($turnover,60)-1))"
direction: 1
description: "20 day low-normalized intraday selling pressure damped when recent turnover deviates from its 60 day baseline."
expected_behavior: "Tests whether the reviewed low-normalized selling-pressure reversal is cleaner when event-driven turnover shocks are penalized instead of used as a hard confirmation gate. Mean(($open-$close)/$low,20) rewards repeated close-below-open pressure relative to the session low, while 1+Abs(Mean($turnover,20)/Mean($turnover,60)-1) reduces scores for names whose recent turnover is far from its medium-term norm. This avoids the crashed turnover-confirmation path and the discarded pure turnover-volatility, volatility-damped, range-compression, downside-only, low-rebound, and near-low penalty ideas while keeping the expression low complexity. The expression uses only allowed open, close, low, and turnover fields; allowed 20 and 60 day windows; and allowed Mean and Abs operators."
