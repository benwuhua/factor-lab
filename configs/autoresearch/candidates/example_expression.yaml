name: range_volatility_10_v1
family: volatility
expression: "Mean(($high - $low) / $close, 10)"
direction: -1
description: "10 day average intraday high-low range scaled by close, ranked as a low-volatility signal."
expected_behavior: "Stocks with tighter recent intraday ranges should have lower realized uncertainty and may deliver steadier 20 day forward returns."
