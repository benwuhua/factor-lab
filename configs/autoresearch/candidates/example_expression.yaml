name: low_norm_volume_divergence_reversal_20_60_v1
family: divergence
expression: "Mean(($open-$close)/$low,20)+Mean(($open-$close)/$low,60)-Corr($close,$volume,20)"
direction: 1
description: "20 and 60 day low-normalized intraday selling-pressure reversal adjusted by recent close-volume divergence; stocks with persistent weak closes and less volume-confirmed price strength rank higher."
expected_behavior: "Extends the reviewed low-normalized selling-pressure reversal with one simple divergence term, without repeating the crashed turnover confirmation, discarded low-rebound/downside-clipping, or high-complexity OHLC-average ideas. The two Mean terms capture recent and persistent close-below-open pressure as a share of the session low. Subtracting Corr($close,$volume,20) favors names where price strength is not strongly confirmed by volume, preserving an interpretable exhaustion/reversal premise. The expression uses only allowed open, close, low, and volume fields; allowed 20 and 60 day windows; two Mean operators; and one Corr operator."
