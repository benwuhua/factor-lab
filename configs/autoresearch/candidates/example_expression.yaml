name: low_anchor_recent_high_reversion_60_20_v1
family: reversal
expression: "Mean($low, 60) / Mean($high, 20) - 1"
direction: 1
description: "60 day low-anchor reversion measured against the recent 20 day high; stocks whose medium-term upside range remains close to their longer-run low anchor rank higher."
expected_behavior: "Extends the reviewed low-anchor recent-high reversal idea from 5 and 10 day denominators to a 20 day denominator to further smooth recent high noise and potentially reduce turnover while keeping the same economic interpretation. The expression uses only allowed windows and avoids previously discarded turnover, VWAP, volatility-scaled, range-normalized, and explicit Min/Max price-position ideas."
