name: turnover_compression_5_60_v1
family: turnover
expression: "Mean($turnover, 5) / (Mean($turnover, 60) + 0.000001)"
direction: -1
description: "5 day average turnover scaled by the 60 day turnover baseline, ranked as a low-crowding signal."
expected_behavior: "Stocks with subdued recent turnover relative to their own medium-term baseline should be less crowded and may have better 20 day forward returns."
