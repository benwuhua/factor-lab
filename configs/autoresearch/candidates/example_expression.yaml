name: vwap_anchor_reversion_60_v1
family: reversal
expression: "Mean($amount / $volume, 60) / $close - 1"
direction: 1
description: "60 day traded-price anchor reversal; stocks with current closes below their medium-term amount-per-volume price anchor rank higher."
expected_behavior: "Uses a simple VWAP-like anchor to test whether the reviewed 60 day mean-reversion effect is stronger when the reference price is weighted by traded value rather than the daily close or high-low midpoint, while avoiding discarded turnover filters, range normalization, and disallowed short windows."
