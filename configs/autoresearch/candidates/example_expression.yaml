name: volatility_scaled_close_reversal_20_v1
family: reversal
expression: "(Ref($close,20)/$close-1)/(Std($close/Ref($close,3)-1,20)+0.000001)"
direction: 1
description: "20 day close-to-close reversal scaled by recent 3 day return volatility."
expected_behavior: "Ref($close,20)/$close-1 captures a transparent medium-horizon drawdown reversal signal: higher values mean the current close is depressed versus the close 20 sessions earlier. Dividing by Std($close/Ref($close,3)-1,20)+0.000001 favors cleaner drawdowns where the reversal opportunity is not simply compensation for high recent price turbulence. This is distinct from discarded pure low-volatility, near-low, intraday-shortfall, and turnover-divergence ideas, avoids turnover fields that have crashed, and keeps the candidate low complexity with only the allowed close field, allowed 3 and 20 day windows, and allowed Ref and Std operators."
