name: volume_confirmed_high_mean60_discount_reversal_20_60_v1
family: reversal
expression: "((Mean($high,60)-$close)/$close)*(Mean($volume,20)/Mean($volume,60))"
direction: 1
description: "60 day mean-high discount reversal scaled by 20 over 60 day volume confirmation."
expected_behavior: "Ranks stocks higher when the close sits below the stock's 60 day average high and recent 20 day volume is firm relative to its 60 day baseline. This keeps the successful high-discount reversal intuition but removes the Corr term and extra short-volume acceleration that pushed recent variants toward higher complexity. It avoids the discarded low-turnover, range-position, heavy extra-smoothing, and crashed turnover-divergence paths while using only allowed high, close, and volume fields with 20 and 60 day windows."
