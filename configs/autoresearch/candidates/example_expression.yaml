name: amount_damped_low_norm_pressure_reversal_20_60_v1
family: reversal
expression: "Mean(($open-$close)/$low,20)/(1+Abs(Mean($amount,20)/Mean($amount,60)-1))"
direction: 1
description: "20 day low-normalized intraday selling pressure damped when recent amount deviates from its 60 day baseline; steady selling pressure ranks higher than event-driven liquidity spikes."
expected_behavior: "Keeps the reviewed low-normalized selling-pressure reversal backbone while adding a compact amount-stability denominator instead of turnover gates, threshold If logic, short drawdown legs, or OHLC composites. Mean(($open-$close)/$low,20) rewards persistent closes below open relative to the day's low, while 1+Abs(Mean($amount,20)/Mean($amount,60)-1) reduces scores when recent trading amount is far from its medium-term norm, aiming to separate repeatable pressure from one-off liquidity shocks. This avoids the crashed turnover-confirmation path and the discarded pure volatility, downside-only, low-rebound, short drawdown, range-compression, and pressure-volume divergence ideas. The expression uses only allowed open, close, low, and amount fields; allowed 20 and 60 day windows; and allowed Mean and Abs operators."
