name: upper_mid_120d_discount_volume_divergence_reversal_20_120_v1
family: divergence
expression: "0-Corr((($high+$close)/2)/Mean(($high+$close)/2,20),$volume/Mean($volume,20),20)+(Mean($high,120)-$close)/Mean($high,120)"
direction: 1
description: "20 day upper-mid price versus volume divergence with a 120 day mean-high discount reversal term."
expected_behavior: "Ranks stocks higher when the upper-mid price proxy, (high plus close)/2, is weakly confirmed by normalized volume over 20 days, while adding a longer-horizon reversal tilt for names whose close sits below the 120 day mean high. This keeps the productive high-discount volume-divergence family but replaces the raw high anchor with a less single-print-sensitive upper-mid anchor, avoiding a direct repeat of the prior high-only 60 day or 120 day discount tests, amount variants, fast-horizon checks, and the discarded range-position, volatility-only, and turnover-divergence crash patterns. The expression uses only allowed high, close, and volume fields with 20 and 120 day windows, four Mean calls, and one Corr call."
