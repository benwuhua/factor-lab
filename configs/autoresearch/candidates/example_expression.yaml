name: low_anchor_recent_low_reversion_60_5_v1
family: reversal
expression: "Mean($low, 60) / Mean($low, 5) - 1"
direction: 1
description: "60 day low-anchor reversion measured against the recent 5 day average low; stocks making short-term lows below their longer-run low anchor rank higher."
expected_behavior: "Extends the reviewed low-anchor reversal family by replacing close/open denominators with a recent low denominator. The 5 day low average smooths single-day low noise while keeping the expression low complexity, using only allowed 5 and 60 day windows, and avoiding previously discarded turnover, VWAP, volatility-scaled, range-normalized, Min/Max price-position, and disallowed 0/1 day window ideas."
