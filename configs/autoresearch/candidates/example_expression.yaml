name: close_20d_plain_reversal_v1
family: reversal
expression: "Ref($close,20)/$close-1"
direction: 1
description: "Plain 20 day close-to-close reversal; stocks whose current close is below the close 20 sessions ago rank higher."
expected_behavior: "This deliberately resets to a low-complexity baseline after many reviewed variants around low-normalized intraday selling pressure, turnover damping, volume divergence, and midpoint discounts. Ref($close,20)/$close-1 is a transparent medium-horizon reversal signal: higher values mean larger 20 day price drawdowns, which may mean revert over the evaluation horizon. It avoids the discarded turnover confirmation/divergence crash paths, discarded pure volatility/near-low/close-from-high/downside-open variants, and high-complexity normalized divergence expressions. It uses only the allowed close field, the allowed 20 day window, and one allowed Ref operator."
