name: gap3_volume_divergence_20_v1
family: divergence
expression: "0-Corr(($open/Ref($close,3)-1),$volume/Mean($volume,20),20)"
direction: 1
description: "20 day divergence between the 3 day open gap anchor and normalized traded volume."
expected_behavior: "A higher value means the rolling correlation between the 3 day open gap anchor, $open/Ref($close,3)-1, and volume relative to its 20 day mean is lower or negative. The idea keeps the reviewed open-gap and price-volume divergence themes but tests a cleaner gap-volume confirmation signal rather than another intraday price anchor variant. It avoids turnover expressions that recently crashed and discarded pure volatility, range-position, and intraday-rebound divergence paths, using only allowed open, close, and volume fields; the allowed 3 and 20 day windows; and one Corr, one Ref, and one Mean operator."
