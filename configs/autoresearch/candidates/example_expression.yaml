name: low_norm_pressure_volume_divergence_20_60_v1
family: divergence
expression: "Mean(($open-$close)/$low,20)+Mean(($open-$close)/$low,60)-Corr(($open-$close)/$low,$volume,20)"
direction: 1
description: "20 and 60 day low-normalized intraday selling-pressure reversal with a 20 day pressure-volume divergence adjustment."
expected_behavior: "Keeps the reviewed low-normalized selling-pressure reversal backbone while testing whether the signal is cleaner when weak intraday closes are not strongly volume-confirmed. The two Mean terms capture recent and persistent close-below-open pressure relative to the session low. Subtracting Corr(($open-$close)/$low,$volume,20) favors names where that pressure is less synchronized with volume, suggesting lower-conviction selling rather than confirmed distribution. This avoids the crashed turnover-confirmation path and the discarded downside clipping, low-rebound, pure range-compression, and high-complexity OHLC composite ideas. The expression uses only allowed open, close, low, and volume fields; allowed 20 and 60 day windows; two Mean operators; and one Corr operator."
