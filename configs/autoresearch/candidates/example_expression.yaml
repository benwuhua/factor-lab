name: low_close_rebound_high_volume_divergence_20_v1
family: divergence
expression: "0-Corr($high/Mean($high,20),$volume/Mean($volume,20),20)+($close-$low)/Mean($high,20)"
direction: 1
description: "20 day high-price versus volume divergence with a low-to-close intraday rebound tilt."
expected_behavior: "Ranks stocks higher when normalized high prices are weakly confirmed by normalized volume, and adds a modest boost when the close recovers above the intraday low. This keeps the productive high-price volume divergence intuition while testing a simple rebound-style reversal term instead of the prior upper-wick pressure variant. It avoids the discarded range-position, average-trade-price discount, volatility-damped, and crashed turnover-divergence paths. The expression uses only allowed high, low, close, and volume fields with one 20 day window, three Mean operators, and one Corr operator."
