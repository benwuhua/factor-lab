name: low_turnover_low_norm_pressure_reversal_20_v1
family: reversal
expression: "Mean(($open-$close)/$low,20)/(1+Mean($turnover,20))"
direction: 1
description: "20 day close-below-open pressure scaled by low price and softly penalized by average turnover level."
expected_behavior: "Tests whether the reviewed low-normalized selling-pressure reversal is cleaner when high-turnover names are damped by their 20 day average turnover level rather than by relative turnover instability. The numerator reuses Mean(($open-$close)/$low,20), rewarding repeated closes below the open on a low-price scale. The denominator 1+Mean($turnover,20) is a low-complexity liquidity penalty, distinct from discarded pure low-turnover, turnover-volatility, turnover-confirmation, and relative turnover-stability variants. It uses only allowed open, close, low, and turnover fields; the allowed 20 day window; and the allowed Mean operator."
