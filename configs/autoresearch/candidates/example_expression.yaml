name: upper_mid_liquidity_divergence_20_v1
family: divergence
expression: "0-Corr(($high+$close)/Mean($high+$close,20),($volume/Mean($volume,20)+$amount/Mean($amount,20)),20)"
direction: 1
description: "20 day divergence between upper-mid price strength and normalized combined share/dollar liquidity."
expected_behavior: "Ranks stocks higher when the high/close upper-mid price level is not confirmed by the combined normalized volume and amount series. This keeps the successful high/upper-mid price-volume divergence intuition, adds amount as a low-complexity liquidity confirmation check, and avoids the discarded average-trade-price discount and crashed turnover-divergence paths. The expression uses only allowed high, close, volume, and amount fields with one 20 day window, three Mean operators, and one Corr operator."
