name: turnover_volatility_low_20_v1
family: turnover
expression: "Std($turnover, 20)"
direction: -1
description: "Twenty day turnover volatility; lower unstable trading activity is ranked higher."
expected_behavior: "Tests whether stocks with steadier recent trading participation carry a cleaner forward return signal than high-churn names. This is distinct from the discarded turnover_mean_60_low_v1 level signal and avoids the crash-prone turnover confirmation pattern by using turnover alone with one allowed Std operator and one allowed 20 day window."
