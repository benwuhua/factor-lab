name: open_range_position_reversal_20_v1
family: price_position
expression: "0-(($open-Min($low,20))/(Max($high,20)-Min($low,20)))"
direction: 1
description: "Negative open position within the trailing 20 day high-low range."
expected_behavior: "A higher value means today's open is lower within its recent 20 day high-low range, favoring simple short-term reversal from depressed opening levels. This is a low-complexity price-position candidate distinct from the prior close range position, selling-pressure, turnover-damped, and volume-divergence families. It avoids turnover-based expressions that recently crashed and uses only allowed open, low, high fields; the allowed 20 day window; and one Min plus one Max range anchor."
