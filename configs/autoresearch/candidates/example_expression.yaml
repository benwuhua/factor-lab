name: prior_low_break_low_norm_pressure_reversal_3_20_60_v1
family: reversal
expression: "Mean(($open-$close)/$low,20)+Mean(($open-$close)/$low,60)+(0-Mean($close/Ref($low,3)-1,20))"
direction: 1
description: "20 and 60 day low-normalized intraday selling-pressure reversal, plus a 20 day prior-low-break weakness term using the low from three sessions earlier."
expected_behavior: "Combines the reviewed low-normalized selling-pressure backbone with a compact prior-low-break price-position add-on. Mean(($open-$close)/$low,20) captures recent close-below-open pressure relative to the session low, while Mean(($open-$close)/$low,60) keeps the persistent pressure anchor. The final term, 0-Mean($close/Ref($low,3)-1,20), ranks higher when closes have stayed weak versus the low from three sessions earlier, extending the standalone prior-low-break idea without adding turnover, amount, volatility damping, range-compression, downside clipping, or threshold gates. This avoids the crashed turnover confirmation/divergence paths and the discarded pure volatility, low-rebound, close-from-high, near-60-day-low, and high-complexity normalized-divergence variants while using only allowed open, close, and low fields; allowed 3, 20, and 60 day windows; and allowed Mean and Ref operators."
