name: short_volume_baseline_high_mean60_discount_divergence_reversal_5_20_60_v1
family: divergence
expression: "0-Corr($high/Mean($high,20),$volume/Mean($volume,5),20)+(Mean($high,60)-$close)/$close"
direction: 1
description: "20 day high-price versus short-baseline volume divergence with a 60 day mean-high discount reversal term."
expected_behavior: "Ranks stocks higher when 20 day normalized highs are weakly confirmed by volume measured against a 5 day baseline, and when the close sits below the stock's 60 day average high. This keeps the reviewed high-discount volume-divergence structure while testing whether very recent participation is less redundant than the prior 20, 60, and 120 day volume or amount baselines, avoiding the discarded range-position, low-turnover, extra-smoothing, and crashed turnover-divergence paths. The expression uses only allowed high, close, and volume fields with 5, 20, and 60 day windows, three Mean calls, and one Corr call."
