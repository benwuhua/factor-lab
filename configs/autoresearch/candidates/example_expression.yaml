name: close_mean_range_discount_reversal_20_v1
family: price_position
expression: "(Mean($high,20)-$close)/(Mean($high,20)-Mean($low,20))"
direction: 1
description: "20 day close discount versus the rolling mean high-low channel."
expected_behavior: "A higher value means today's close sits further below the 20 day average high, scaled by the 20 day average high-low spread. This is a low complexity price-position reversal test: names with plain close reversal and range position have produced reviewable rows, while recent discarded ideas were mainly volatility-only, open range position, or turnover-divergence variants. The expression uses only allowed high, low, and close fields; the allowed 20 day window; and three Mean operators."
