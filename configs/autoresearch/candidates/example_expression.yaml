name: close_below_open_low_mid_reversal_20_60_v1
family: price_position
expression: "Mean((($open + $low) / 2 - $close) / (($open + $low) / 2), 20) + Mean((($open + $low) / 2 - $close) / (($open + $low) / 2), 60)"
direction: 1
description: "20 and 60 day blend of how far the close sits below the daily open-low midpoint; stocks repeatedly finishing near the lower part of the open-to-low zone rank higher."
expected_behavior: "Tests a low-complexity price-position reversal adjacent to the reviewed close-below-HL-mid and open-normalized selling-pressure families without repeating the discarded high-pullback, low-rebound, downside clipping, turnover-confirmation, or high-complexity OHLC-average variants. The open-low midpoint removes the day's high from the anchor, so the signal focuses on closes that remain weak relative to the open and session low rather than on upper-wick or 60 day ceiling effects. Higher values should favor names with persistent weak closing location that may be prone to mean reversion. The expression uses only allowed open, low, and close fields; allowed 20 and 60 day windows; and two rolling Mean operators."
