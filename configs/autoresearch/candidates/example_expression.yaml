name: normalized_low_norm_volume_divergence_reversal_20_60_v1
family: divergence
expression: "Mean(($open-$close)/$low,20)+Mean(($open-$close)/$low,60)-Corr($close/Mean($close,20),$volume/Mean($volume,20),20)"
direction: 1
description: "Low-normalized 20 and 60 day selling pressure with a normalized price-volume divergence adjustment."
expected_behavior: "Tests whether the strong low-normalized selling-pressure reversal backbone improves when it favors names whose normalized close path is not positively confirmed by normalized volume. The two Mean(($open-$close)/$low, window) terms reward persistent close-below-open pressure on a low-price scale, while subtracting Corr($close/Mean($close,20),$volume/Mean($volume,20),20) favors weak or negative price-volume co-movement without using the previously crashing turnover-confirmation pattern. This avoids the discarded pure volatility, downside-only, near-60-day-low, direct range-position, and pressure-volume self-correlation ideas while staying inside the allowed fields, windows, and operators."
