name: low_anchor_intraday_pressure_reversal_20_60_v1
family: reversal
expression: "Mean(($open-$close)/$low,20)+Mean($low,60)/$low-1"
direction: 1
description: "20 day low-normalized intraday selling pressure blended with a 60 day low anchor; stocks with repeated closes below open and current lows below their medium-term low baseline rank higher."
expected_behavior: "Tests a compact additive blend of the reviewed low-normalized selling-pressure backbone and the earlier low-anchor reversal family without adding volume, turnover, threshold gates, Ref drawdown legs, or high-complexity OHLC composites. Mean(($open-$close)/$low,20) captures persistent intraday selling pressure, while Mean($low,60)/$low-1 favors names whose current low sits below their 60 day low baseline, preserving a simple exhaustion/reversion premise. This avoids the latest discarded short drawdown variant, the crashed turnover-confirmation path, and the discarded downside-only, low-rebound, range-compression, pure volatility, and pressure-volume divergence ideas. The expression uses only allowed open, close, and low fields; allowed 20 and 60 day windows; and two allowed Mean operators."
