name: low_norm_selling_pressure_reversal_10_120_v1
family: reversal
expression: "Mean(($open-$close)/$low,10)+Mean(($open-$close)/$low,120)"
direction: 1
description: "10 and 120 day low-normalized intraday selling-pressure reversal."
expected_behavior: "Tests whether a fast 10 day close-below-open pressure leg plus a slow 120 day persistence leg improves the reviewed low-normalized selling-pressure reversal family without adding gates or extra normalization. Higher values indicate recent and long-run intraday selling pressure relative to the session low, a simple capitulation and mean-reversion setup. This avoids the crashed turnover-confirmation path, discarded downside-only and range-compression variants, pressure-volume divergence discard, and high-complexity OHLC composites. The expression uses only allowed open, close, and low fields; allowed 10 and 120 day windows; and two Mean operators."
