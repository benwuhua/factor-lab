name: mean_close_reversion_20_v1
family: reversal
expression: "Mean($close, 20) / $close - 1"
direction: 1
description: "20 day moving-average close reversion; stocks trading below their recent average rank higher without adding liquidity or volatility filters."
expected_behavior: "Using the 20 day mean as a smooth anchor should capture medium-horizon price dislocation with lower noise than endpoint close reversal, while keeping turnover and complexity low."
