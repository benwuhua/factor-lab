name: volume_weighted_persistent_low_norm_pressure_reversal_20_60_v1
family: reversal
expression: "Mean((($open-$close)/$low)*($volume/Mean($volume,20)),20)+Mean(($open-$close)/$low,60)"
direction: 1
description: "20 day low-normalized selling pressure weighted by relative volume, plus a 60 day persistent low-normalized pressure anchor."
expected_behavior: "Tests whether the reviewed low-normalized selling-pressure reversal improves when recent close-below-open pressure is emphasized on above-normal volume while retaining a simple 60 day persistence leg. The first term weights (($open-$close)/$low) by $volume/Mean($volume,20), favoring repeated weak intraday closes with heavier participation that may reflect capitulation. The second term keeps the durable Mean(($open-$close)/$low,60) reversal anchor. This is distinct from prior pure volume-weighted 20 day, close-volume correlation divergence, turnover-damped, and turnover-confirmation variants, avoids the crashed turnover paths and discarded downside-only, low-rebound, range-compression, and high-complexity normalized-divergence ideas, and uses only allowed open, close, low, and volume fields; allowed 20 and 60 day windows; and allowed Mean operators."
