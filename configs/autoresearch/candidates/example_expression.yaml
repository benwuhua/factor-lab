name: close_60d_plain_reversal_v1
family: reversal
expression: "Ref($close,60)/$close-1"
direction: 1
description: "Plain 60 day close-price reversal using the close from sixty sessions ago relative to the current close."
expected_behavior: "Tests a deliberately low-complexity extension of the reviewed close_20d_plain_reversal idea at a medium horizon rather than adding another denominator, turnover, volatility, or divergence modifier. A higher value means the current close is depressed versus the close sixty trading sessions earlier, which may capture medium-horizon overreaction and subsequent mean reversion. This avoids the discarded pure volatility, near-low, downside-only, short-drawdown, close-from-high, and crash-prone turnover confirmation or turnover divergence paths. The expression uses only the allowed close field, the allowed 60 day window, and one allowed Ref operator."
