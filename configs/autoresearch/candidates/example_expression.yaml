name: upper_shadow_relief_reversal_60_5_v1
family: divergence
expression: "Mean($high / $close - 1, 60) - Mean($high / $close - 1, 5)"
direction: 1
description: "Long-run average upper-shadow pressure minus recent upper-shadow pressure; stocks whose recent closes are nearer to intraday highs than their 60 day baseline rank higher."
expected_behavior: "Tests a simple price-position divergence rather than another low-anchor variant: a high value means the 5 day average high-to-close gap has compressed below its 60 day norm, suggesting recent selling into intraday strength has eased. The factor uses only allowed high/close fields, 60 and 5 day windows, and two Mean operators, while avoiding discarded turnover, VWAP, range-normalized, distance-from-low, and disallowed-window ideas."
