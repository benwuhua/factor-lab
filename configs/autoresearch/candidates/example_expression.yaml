name: open_norm_amount_weighted_pressure_reversal_20_60_v1
family: reversal
expression: "Mean((($open-$close)/$open)*($amount/Mean($amount,20)),20)+Mean(($open-$close)/$open,60)"
direction: 1
description: "20 day open-normalized selling pressure weighted by relative traded amount, plus a 60 day persistent open-normalized pressure anchor."
expected_behavior: "Tests whether the reviewed open-normalized selling-pressure reversal improves when recent close-below-open pressure is emphasized on above-normal traded amount while retaining a simple 60 day persistence leg. The first term weights (($open-$close)/$open) by $amount/Mean($amount,20), favoring repeated weak intraday closes with heavier value participation that may reflect capitulation by larger capital flows. The second term keeps the durable Mean(($open-$close)/$open,60) reversal anchor. This is distinct from prior low-normalized amount-weighted, volume-weighted, turnover-damped, turnover-confirmation, and price-volume correlation divergence variants, avoids the crashed turnover paths and discarded downside-only, low-rebound, range-compression, and high-complexity normalized-divergence ideas, and uses only allowed open, close, and amount fields; allowed 20 and 60 day windows; and allowed Mean operators."
