name: smooth_low_anchor_reversion_120_5_v1
family: reversal
expression: "Mean($low, 120) / Mean($close, 5) - 1"
direction: 1
description: "Smoothed 120 day low-anchor reversion; stocks whose recent 5 day average close sits below their 120 day average low rank higher."
expected_behavior: "Extends the reviewed low-anchor reversion family from a 60 day anchor to a slower 120 day anchor while keeping the 5 day close smoother that previously reduced single-day noise. It uses only allowed 120 and 5 day windows and avoids the discarded Min-based price-position, turnover-only, VWAP-anchor, volatility-scaled, range-normalized, and disallowed 0 or 1 day window ideas."
