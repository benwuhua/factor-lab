name: low_ohlc_anchor_reversion_60_v1
family: reversal
expression: "Mean($low, 60) / (($open + $high + $low + $close) / 4) - 1"
direction: 1
description: "60 day low-anchor reversion measured against the current OHLC average; stocks whose full-session average price sits below their longer-run low anchor rank higher."
expected_behavior: "Extends the reviewed low-anchor reversal family with a current OHLC denominator instead of single-price or two-price anchors. This stays low complexity, uses only the allowed 60 day window, and avoids previously discarded turnover, VWAP, volatility-scaled, range-normalized, Min/Max price-position, and disallowed 0/1 day window ideas."
