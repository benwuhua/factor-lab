name: close_range_position_reversal_20_60_v1
family: price_position
expression: "Mean(($high-$close)/($high-$low+0.000001),20)+Mean(($high-$close)/($high-$low+0.000001),60)"
direction: 1
description: "20 and 60 day blend of close location within each day's high-low range; stocks repeatedly closing nearer the session low rank higher."
expected_behavior: "Tests a low-complexity price-position reversal signal related to the reviewed close-below-midpoint idea, but normalizes by the full daily range instead of the price midpoint. Mean(($high-$close)/($high-$low+0.000001),20) captures recent weak closing location, while the 60 day term captures persistent lower-range closes. Higher values should favor names with sustained close-near-low pressure that may mean revert, without using turnover confirmation, volume divergence, threshold clipping, disallowed windows, or high-complexity OHLC composites. The expression uses only allowed high, low, and close fields; allowed 20 and 60 day windows; and two allowed Mean operators."
