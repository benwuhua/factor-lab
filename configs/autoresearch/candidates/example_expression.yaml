name: lagged_close_reversal_60_5_v1
family: reversal
expression: "Ref($close, 60) / Ref($close, 5) - 1"
direction: 1
description: "Lagged 60-to-5 day close reversal; stocks that fell over the older medium-term window rank higher while the most recent week is skipped."
expected_behavior: "Keeps the reviewed medium-term reversal theme but avoids reacting to the latest 5 sessions, aiming to reduce noisy short-term rebounds and keep turnover low with a two-Ref expression."
