name: open_low_mid_discount_pressure_reversal_20_60_v1
family: reversal
expression: "Mean((($open+$low)/2-$close)/$low,20)+Mean(($open-$close)/$low,60)"
direction: 1
description: "20 day open-low midpoint discount reversal plus a 60 day low-normalized selling-pressure anchor."
expected_behavior: "Mean((($open+$low)/2-$close)/$low,20) rewards names whose closes persistently finish below the lower intraday open-low midpoint, capturing clear end-of-day selling pressure without adding volume, turnover, or volatility filters. Mean(($open-$close)/$low,60) keeps the simple persistent low-normalized pressure anchor that has repeatedly survived review. This is distinct from the prior high-low midpoint discount, open-low midpoint normalization, near-low, low-rebound, pure volatility, and turnover confirmation/divergence variants, while using only allowed open, low, and close fields; allowed 20 and 60 day windows; and allowed Mean operators."
