name: open_high_mid_pressure_reversal_20_60_v1
family: reversal
expression: "Mean(($open + $high - 2 * $close) / $close, 20) + Mean(($open + $high - 2 * $close) / $close, 60)"
direction: 1
description: "20 and 60 day blend of how far the close finishes below the open-high midpoint, scaled by close; persistent weak closes versus the upper intraday anchor rank higher."
expected_behavior: "Tests a low-complexity reversal signal in the selling-pressure family without repeating the discarded full OHLC average variant. Mean(($open + $high - 2 * $close) / $close, 20) captures recent closes below the open-high midpoint, while the 60 day term captures more persistent closing weakness. Higher values should favor names with sustained intraday selling pressure that may be prone to reversal. The expression uses only allowed open, high, and close fields, the allowed 20 and 60 day windows, and two rolling Mean operators."
