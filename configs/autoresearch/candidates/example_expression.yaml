name: multi_horizon_low_norm_selling_pressure_reversal_20_60_120_v1
family: reversal
expression: "Mean(($open-$close)/$low,20)+Mean(($open-$close)/$low,60)+Mean(($open-$close)/$low,120)"
direction: 1
description: "20, 60, and 120 day low-normalized intraday selling-pressure reversal; stocks with repeated closes below open relative to the session low rank higher."
expected_behavior: "Extends the reviewed low-normalized selling-pressure reversal backbone by adding a slower 120 day persistence anchor rather than another denominator, turnover, volume, or threshold tweak. The 20 day Mean captures recent close-below-open pressure, the 60 day Mean keeps the strongest persistent leg from prior reviewed candidates, and the 120 day Mean tests whether a slower exhaustion component improves stability without materially increasing complexity. This avoids the crashed turnover-confirmation path, discarded downside-only, low-rebound, range-compression, pressure-volume divergence, pure volatility, and high-complexity OHLC composite ideas. The expression uses only allowed open, close, and low fields; allowed 20, 60, and 120 day windows; and three allowed Mean operators."
