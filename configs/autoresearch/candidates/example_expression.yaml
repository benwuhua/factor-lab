name: selling_pressure_reversal_20_60_v1
family: reversal
expression: "Mean($open - $close, 20) / Mean($close, 60)"
direction: 1
description: "Persistent 20 day intraday selling pressure normalized by the 60 day average close; stocks repeatedly closing below their opens rank higher for a simple mean-reversion test."
expected_behavior: "Tests a low-complexity reversal signal outside the heavily explored low-anchor high-ceiling variants and away from discarded turnover, range-volatility, VWAP, distance-from-low, upper-shadow, and disallowed-window ideas. Mean($open - $close, 20) captures sustained negative intraday body pressure, while Mean($close, 60) scales the signal by the stock price level. Higher values should favor names with repeated intraday weakness that may be overextended and prone to reversal. The expression uses only allowed open/close fields, 20/60 windows, and two rolling Mean operators."
