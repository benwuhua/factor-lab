name: low_anchor_smooth_high_ceiling_reversion_60_5_10_v1
family: reversal
expression: "Mean($low, 60) / Max(Mean($high, 5), 10) - 1"
direction: 1
description: "60 day low-anchor reversion measured against a smoothed recent high ceiling; stocks whose smoothed rebound highs remain close to their longer-run low anchor rank higher."
expected_behavior: "Tests a low-complexity extension of the reviewed low-anchor reversal family by replacing a single-day high ceiling with the 10 day maximum of the 5 day average high. The 60 day average low supplies a stable downside anchor, while the smoothed high ceiling dampens one-day spikes but still captures recent rebound attempts. Higher values should favor names still compressed near their longer-run low with limited sustained upside follow-through. The expression uses only allowed low/high fields, 5, 10, and 60 day windows, and simple rolling operators, avoiding discarded turnover, VWAP, volatility-scaled, range-normalized, distance-from-low, upper-shadow, and disallowed-window ideas."
