name: low_norm_selling_pressure_reversal_20_60_v1
family: reversal
expression: "Mean(($open - $close) / $low, 20) + Mean(($open - $close) / $low, 60)"
direction: 1
description: "20 and 60 day intraday selling-pressure reversal normalized by the session low; stocks with repeated closes below open as a share of low rank higher."
expected_behavior: "Tests a low-complexity price-position variant of the reviewed open-normalized and close-normalized selling-pressure families without repeating their exact denominator choice. Mean(($open - $close) / $low, 20) captures recent down-body pressure relative to the day's lower trading anchor, while the 60 day term captures persistent pressure. This avoids discarded downside clipping, low-rebound, direct turnover weighting, and high-complexity OHLC-average variants, and it uses no crash-prone disallowed windows. Higher values should favor names with repeated intraday selling pressure that may mean revert over the evaluation horizon. The expression uses only allowed open, close, and low fields; allowed 20 and 60 day windows; and two allowed Mean operators."
