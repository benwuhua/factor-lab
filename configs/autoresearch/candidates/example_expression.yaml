name: volatility_scaled_mean_reversion_60_v1
family: reversal
expression: "(Mean($close, 60) - $close) / (Std($close, 60) + 0.000001)"
direction: 1
description: "60 day volatility-scaled close mean reversion; stocks trading far below their own medium-term average after close-volatility scaling rank higher."
expected_behavior: "Keeps the reviewed 60 day mean-reversion anchor but scales by each stock's own 60 day close variability, aiming to favor cleaner dislocations rather than simply volatile losers."
