name: low_anchor_high_ceiling_selling_pressure_reversion_60_3_20_v1
family: reversal
expression: "Mean($low, 60) / (Max($high, 3) - Mean($open - $close, 20)) - 1"
direction: 1
description: "60 day low-anchor reversal against a 3 day high ceiling, adjusted upward when recent open-to-close bodies show persistent selling pressure."
expected_behavior: "Extends the reviewed low-anchor high-ceiling cluster with the separately reviewed selling-pressure signal, rather than repeating discarded turnover, volatility-scaled, range-normalized, VWAP, distance-from-low, or upper-shadow variants. Mean($low, 60) keeps the stable downside anchor, Max($high, 3) penalizes names that already rebounded to a fresh short-term high, and subtracting Mean($open - $close, 20) raises the score when recent closes have persistently finished below opens. Higher values should favor compressed stocks still near their long-run low anchor with unresolved sell-pressure exhaustion. The expression uses only allowed open/high/low/close fields, 3/20/60 windows, and three rolling operators."
