name: close_60d_range_position_reversal_v1
family: price_position
expression: "0-($close-Min($low,60))/(Max($high,60)-Min($low,60))"
direction: 1
description: "60 day close position reversal within the rolling high-low range."
expected_behavior: "A higher value means today's close sits nearer the 60 day rolling low than the 60 day rolling high, expressing a simple medium horizon price-position reversal signal. This keeps complexity low with only Min and Max over the allowed 60 day window, avoids turnover expressions that recently crashed, and differs from discarded open/intraday position ideas by anchoring on close within the broader 60 day high-low range."
