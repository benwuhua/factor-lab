name: low_norm_turnover_divergence_reversal_20_v1
family: divergence
expression: "Mean(($open-$close)/$low,20)-Corr($close/Mean($close,20),$turnover/Mean($turnover,20),20)"
direction: 1
description: "Low-normalized 20 day selling pressure adjusted by price-turnover divergence."
expected_behavior: "Tests whether the reliable low-normalized selling-pressure reversal signal improves when recent price movement is not strongly confirmed by turnover. The Mean(($open-$close)/$low,20) term rewards persistent close-below-open pressure on a low-price scale, while subtracting Corr($close/Mean($close,20),$turnover/Mean($turnover,20),20) favors weak or negative price-turnover co-movement. This keeps the expression lower complexity than the discarded normalized volume-divergence variant and avoids the previously crashing turnover-confirmation condition structure."
