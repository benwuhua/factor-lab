name: high_120d_discount_volume_divergence_reversal_20_120_v1
family: divergence
expression: "0-Corr($high/Mean($high,20),$volume/Mean($volume,20),20)+(Mean($high,120)-$close)/Mean($high,120)"
direction: 1
description: "20 day high-price versus volume divergence with a 120 day mean-high discount reversal term."
expected_behavior: "Ranks stocks higher when normalized highs are weakly confirmed by normalized volume over 20 days, while adding a longer-horizon reversal tilt for names whose close sits below the 120 day mean high. This extends the productive high-discount volume-divergence family with a slower anchor rather than repeating the prior 60 day discount, amount variant, or 10 day fast confirmation test, and avoids the discarded range-position, volatility-only, and turnover-divergence crash patterns. The expression uses only allowed high, close, and volume fields with 20 and 120 day windows, four Mean calls, and one Corr call."
