name: open_pressure_volume_divergence_20_v1
family: divergence
expression: "Mean(($open - $close) / $open, 20) - Corr($close, $volume, 20)"
direction: 1
description: "20 day intraday selling-pressure reversal adjusted by close-volume divergence; stocks with closes below open and weaker close-volume correlation rank higher."
expected_behavior: "Tests whether recent open-normalized down-body pressure is cleaner when paired with negative or weak close-volume correlation. Mean(($open - $close) / $open, 20) captures persistent intraday selling pressure, while subtracting Corr($close, $volume, 20) favors names where volume has not confirmed rising closes, a simple divergence pattern that may indicate exhaustion rather than trend continuation. This avoids previously discarded turnover compression, price-turnover spread, downside clipping, and high-complexity turnover-weighted variants. The expression uses allowed open, close, and volume fields, the allowed 20 day window, and two allowed operators."
