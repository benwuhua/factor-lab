name: avg_trade_price_discount_reversal_20_v1
family: reversal
expression: "(Mean($amount,20)/Mean($volume,20))/$close-1"
direction: 1
description: "20 day average traded price discount reversal using amount divided by volume as a simple VWAP-like anchor."
expected_behavior: "A higher value means the current close is below the 20 day average traded price proxy, Mean(amount,20)/Mean(volume,20). This tests a low-complexity reversal idea anchored on where recent capital transacted rather than another low-norm selling-pressure variant. It avoids the discarded pure range-position and volatility ideas, and avoids the crashed turnover-divergence path. The expression uses only allowed amount, volume, and close fields, the allowed 20 day window, and two Mean operators."
