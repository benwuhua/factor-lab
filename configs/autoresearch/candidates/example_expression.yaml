name: low_anchor_recent_high_reversion_60_10_v1
family: reversal
expression: "Mean($low, 60) / Mean($high, 10) - 1"
direction: 1
description: "60 day low-anchor reversion measured against the recent 10 day high; stocks whose recent upside range remains close to their longer-run low anchor rank higher."
expected_behavior: "Extends the reviewed low-anchor recent-high reversal idea from a 5 day denominator to a 10 day denominator to reduce noise and turnover while keeping the same economic interpretation. The expression avoids disallowed 0/1 day windows and avoids previously discarded turnover, VWAP, volatility-scaled, range-normalized, and explicit Min/Max price-position ideas."
