name: open_norm_price_volume_divergence_20_v1
family: divergence
expression: "0-Corr($open/Mean($open,20),$volume/Mean($volume,20),20)"
direction: 1
description: "20 day negative correlation between normalized open price and normalized volume; stocks where volume does not confirm accepted opening price strength rank higher."
expected_behavior: "Tests a low-complexity divergence variant adjacent to the reviewed normalized close-volume and high-low-midpoint volume divergence ideas, but uses the opening auction/early accepted price anchor instead of the close. Higher values indicate weaker 20 day correlation between open relative to its own 20 day mean and volume relative to its own 20 day mean, which may capture participation that is not confirming price strength. This avoids repeating the discarded 60 day close-volume divergence, turnover-confirmation crash, downside clipping, low-rebound, and pure low-volatility ideas. The expression uses only allowed open and volume fields, the allowed 20 day window, two Mean operators, and one Corr operator."
