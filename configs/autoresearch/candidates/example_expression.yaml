name: volume_uncrowded_low_norm_pressure_reversal_20_60_v1
family: reversal
expression: "(Mean(($open-$close)/$low,20)+Mean(($open-$close)/$low,60))*(1-Abs(Corr($close,$volume,20)))"
direction: 1
description: "20 and 60 day low-normalized intraday selling-pressure reversal, scaled down when close and volume have been tightly correlated over the recent 20 day window."
expected_behavior: "Keeps the reviewed low-normalized selling-pressure backbone: Mean(($open-$close)/$low,20) captures recent close-below-open pressure relative to the session low, while Mean(($open-$close)/$low,60) keeps the persistent pressure anchor. The multiplier, 1-Abs(Corr($close,$volume,20)), favors pressure that is less mechanically tied to recent volume chasing, so the factor ranks higher when selling pressure looks uncrowded rather than volume-confirmed trend continuation. This avoids the crashed turnover confirmation/divergence paths and the discarded pure volatility, downside-only, low-rebound, close-from-high, near-60-day-low, and high-complexity normalized-divergence variants while using only allowed open, close, low, and volume fields; allowed 20 and 60 day windows; and allowed Mean, Corr, and Abs operators."
