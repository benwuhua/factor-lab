name: low_open_mid_anchor_reversion_60_v1
family: reversal
expression: "(Mean($low, 60) + Mean($open, 60)) / ($close + $close) - 1"
direction: 1
description: "60 day low-open midpoint anchor reversion; stocks whose current close sits below the average of recent lows and opens rank higher."
expected_behavior: "Extends the reviewed 60 day anchor-reversion family by blending the stronger low anchor with the open anchor instead of adding turnover, volatility, range scaling, or disallowed 0/1 day windows. The signal stays low-complexity and interpretable: depressed closes relative to a conservative low/open historical price anchor should retain medium-horizon reversal information while avoiding previously discarded turnover-only, VWAP-anchor, range-normalized, volatility-scaled, and Min/Max price-position ideas."
