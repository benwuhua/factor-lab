name: high_close_mid_price_volume_divergence_20_v1
family: divergence
expression: "0-Corr((($high+$close)/2)/Mean(($high+$close)/2,20),$volume/Mean($volume,20),20)"
direction: 1
description: "20 day divergence between normalized high-close midpoint price strength and normalized traded volume."
expected_behavior: "A higher value means the 20 day correlation between the high-close midpoint proxy, (high plus close)/2, and traded volume is more negative. This favors stocks whose upper intraday price zone is not being confirmed by volume, extending the reviewed high-norm and upper-mid price-volume divergence family with a simple two-price proxy while avoiding the crashed turnover-divergence path and discarded range-position ideas. The expression uses only allowed high, close, and volume fields, the allowed 20 day window, and one Corr plus two Mean operators."
