name: range_body_selling_pressure_reversal_20_60_v1
family: reversal
expression: "Mean(($open - $close) / ($high - $low + 0.000001), 20) + Mean(($open - $close) / ($high - $low + 0.000001), 60)"
direction: 1
description: "20 and 60 day intraday selling-pressure reversal blend normalized by each day's high-low range; stocks with persistent down bodies occupying more of the daily range rank higher."
expected_behavior: "Tests whether the reviewed selling-pressure reversal family improves when the open-close body is scaled by same-day trading range rather than close price. Mean(($open - $close) / ($high - $low + 0.000001), 20) captures recent range-relative down-body pressure, while the 60 day term captures persistent session-level selling pressure. Higher values should favor names with sustained downside intraday pressure that may be prone to reversal. The expression uses only allowed open, high, low, and close fields, allowed 20 and 60 day windows, and two rolling Mean operators."
