name: range_compression_low_volatility_20_60_v1
family: volatility
expression: "Mean(($low-$high)/$close,20)+Mean(($low-$high)/$close,60)"
direction: 1
description: "20 and 60 day negative high-low range normalized by close; higher values indicate lower realized intraday range."
expected_behavior: "Tests a low-volatility range-compression effect that is separate from the heavily explored selling-pressure and low-anchor reversal families. Stocks with persistently tighter high-low ranges may carry lower noise and better short-horizon risk-adjusted behavior. The expression uses only allowed high, low, and close fields, allowed 20 and 60 day windows, and two Mean operators, avoiding previously discarded or crashed turnover-confirmation, downside-clipping, range-body, low-rebound, and complex OHLC-composite ideas."
