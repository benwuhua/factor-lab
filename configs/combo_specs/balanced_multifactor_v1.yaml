name: balanced_multifactor_v1
description: "Balanced A-share multi-factor candidate: growth improvement, cashflow quality, low gap risk, quiet breakout, PIT value, and dividend yield. quality_low_leverage is kept as a watch-only member until stability improves."
fundamental_path: data/fundamental_quality.csv
members:
  - name: quality_low_leverage
    active: false
    source: fundamental_quality
    family: fundamental_quality
    logic_bucket: quality_low_leverage
    direction: 1
    weight: 0.00
    approval_status: watch
    regime_profile: all_weather
    components:
      - field: roe
        direction: 1
        weight: 1.00
      - field: gross_margin
        direction: 1
        weight: 0.35
      - field: debt_ratio
        direction: -1
        weight: 0.25
  - name: fundamental_ep
    source: fundamental_quality
    family: value
    logic_bucket: fundamental_value
    direction: 1
    weight: 0.06
    approval_status: core
    regime_profile: all_weather
    description: "source_table=data/fundamental_quality.csv; source_field=ep; role=value alpha."
    components:
      - field: ep
        direction: 1
        weight: 1.00
  - name: fundamental_cfp
    source: fundamental_quality
    family: value
    logic_bucket: fundamental_value
    direction: 1
    weight: 0.06
    approval_status: core
