    regime_profile: all_weather
    components:
      - field: revenue_growth_yoy
        direction: 1
        weight: 0.45
      - field: net_profit_growth_yoy
        direction: 1
        weight: 0.45
      - field: gross_margin
        direction: 1
        weight: 0.10
  - name: cashflow_quality
    source: fundamental_quality
    family: cashflow_quality
    logic_bucket: fundamental_quality
    direction: 1
    weight: 0.10
    approval_status: core
    regime_profile: all_weather
    components:
      - field: operating_cashflow_to_net_profit
        direction: 1
        weight: 1.00
  - name: gap_risk_20
    source: qlib_expression
    expression: "Mean(Abs($open / Ref($close, 1) - 1), 20)"
    family: gap_risk
    logic_bucket: risk_structure
    direction: -1
    weight: 0.15
    approval_status: core
    regime_profile: all_weather
  - name: quiet_breakout_20
    source: qlib_expression
    expression: "($close / Ref($close, 20) - 1) - (Mean($volume, 5) / Mean($volume, 20) - 1)"
    family: quiet_breakout
    logic_bucket: reversal_repair
    direction: 1
    weight: 0.10
    approval_status: core
    regime_profile: all_weather
  - name: value_ep_cfp
    source: fundamental_quality
    family: value
    logic_bucket: fundamental_value
    direction: 1
    weight: 0.20
    approval_status: core
    regime_profile: all_weather
    components:
      - field: ep
        direction: 1
        weight: 0.50
      - field: cfp
        direction: 1
        weight: 0.50
  - name: dividend_yield
    source: fundamental_quality
    family: dividend
    logic_bucket: fundamental_dividend
    direction: 1
    weight: 0.10
    approval_status: core
    regime_profile: down_sideways
    components:
      - field: dividend_yield
        direction: 1
        weight: 1.00
