data_governance:
  expected_universe_path: data/security_master.csv
  min_coverage_ratio: 0.70
  activation_if_missing: shadow
  activation_if_failed: shadow
  domains:
    security_master:
      path: data/security_master.csv
      required_fields:
        - instrument
        - name
        - valid_from
      pit_fields:
        - valid_from
      min_coverage_ratio: 0.95
      activation_lane: security_master
    company_events:
      path: data/company_events.csv
      required_fields:
        - instrument
        - event_type
        - event_date
        - severity
        - source_url
        - active_until
      pit_fields:
        - event_date
        - active_until
      min_coverage_ratio: 0.01
      activation_lane: company_events
    liquidity_microstructure:
      path: data/liquidity_microstructure.csv
      required_fields:
        - instrument
        - date
        - available_at
        - tradable
        - suspended
        - limit_up
        - limit_down
        - buy_blocked
        - sell_blocked
        - amount
        - amount_20d
      pit_fields:
        - date
        - available_at
      freshness_date_column: date
      max_age_days: 7
      min_coverage_ratio: 0.90
      activation_lane: liquidity_microstructure
    emotion_atmosphere:
      path: data/emotion_atmosphere.csv
      required_fields:
        - instrument
        - trade_date
        - available_at
        - up_ratio
        - limit_up_count
        - emotion_score
      pit_fields:
        - trade_date
        - available_at
      freshness_date_column: trade_date
      max_age_days: 7
      min_coverage_ratio: 0.70
      activation_lane: emotion_atmosphere
    fundamental_quality:
      path: data/fundamental_quality.csv
      required_fields:
        - instrument
        - report_period
        - announce_date
        - available_at
        - ep
        - cfp
        - dividend_yield
      pit_fields:
        - report_period
        - announce_date
        - available_at
      min_coverage_ratio: 0.70
      activation_lane: fundamental_quality
    shareholder_capital:
      path: data/shareholder_capital.csv
      required_fields:
        - instrument
        - event_date
        - announce_date
        - event_type
      pit_fields:
        - event_date
        - announce_date
        - available_at
      min_coverage_ratio: 0.01
      activation_lane: shareholder_capital
    announcement_evidence:
      path: data/announcement_evidence.csv
      required_fields:
        - event_id
        - instrument
        - event_date
        - available_at
        - chunk_text
        - source_url
      pit_fields:
        - event_date
        - available_at
      min_coverage_ratio: 0.01
      activation_lane: announcement_evidence
