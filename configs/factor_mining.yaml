templates:
  - name: mom_{window}
    expression: "$close / Ref($close, {window}) - 1"
    windows: [5, 10, 20, 60, 120]
    direction: 1
    category: candidate_momentum
    description: "{window} day close-to-close momentum."
  - name: mom_skip_{lookback}_{skip}
    expression: "Ref($close, {skip}) / Ref($close, {lookback}) - 1"
    params:
      lookback: [20, 60, 120]
      skip: [5]
    direction: 1
    category: candidate_momentum
    description: "{lookback} day momentum skipping the most recent {skip} sessions."
  - name: reversal_{window}
    expression: "Ref($close, {window}) / $close - 1"
    windows: [3, 5, 10, 20]
    direction: 1
    category: candidate_reversal
    description: "{window} day short-term reversal."
  - name: intraday_reversal
    expression: "1 - $close / $open"
    direction: 1
    category: candidate_reversal
    description: "Contrarian signal to the same-day open-to-close return."
  - name: realized_vol_{window}
    expression: "Std($close / Ref($close, 1) - 1, {window})"
    windows: [10, 20, 60]
    direction: -1
    category: candidate_volatility
    description: "{window} day realized volatility; lower values are ranked higher."
  - name: range_vol_{window}
    expression: "Mean(($high - $low) / $close, {window})"
    windows: [10, 20, 60]
    direction: -1
    category: candidate_volatility
    description: "{window} day average intraday high-low range."
  - name: return_variance_{window}
    expression: "Std($close / Ref($close, 1) - 1, {window}) * Std($close / Ref($close, 1) - 1, {window})"
    windows: [20, 60, 120]
    direction: -1
    category: candidate_volatility
    description: "JoinQuant factorlib Variance-style {window} day return variance; lower variance is ranked higher."
  - name: volume_mom_{window}
    expression: "Mean($volume, {window}) / Ref(Mean($volume, {window}), {window}) - 1"
    windows: [5, 20, 60]
    direction: 1
    category: candidate_volume_price
    description: "{window} day volume momentum."
  - name: pv_corr_{window}
    expression: "Corr($close / Ref($close, 1) - 1, $volume / Ref($volume, 1) - 1, {window})"
    windows: [10, 20, 60]
    direction: 1
    category: candidate_volume_price
    description: "{window} day correlation between price return and volume growth."
  - name: vosc_12_26
    expression: "(Mean($volume, 12) - Mean($volume, 26)) / (Mean($volume, 12) + 0.000001)"
    direction: -1
    category: candidate_volume_price
    description: "JoinQuant VOSC-style volume oscillator; lower recent volume expansion versus medium volume is ranked higher."
  - name: davol_{window}
    expression: "Mean($turnover, {window}) / (Mean($turnover, 120) + 0.000001)"
    windows: [5, 10, 20]
    direction: -1
    category: candidate_turnover
    description: "JoinQuant DAVOL-style {window} day average turnover divided by 120 day average turnover; lower relative turnover is ranked higher."
  - name: turnover_mean_{window}
    expression: "Mean($turnover, {window})"
    windows: [5, 10, 20, 60]
    direction: -1
    category: candidate_turnover
    description: "JoinQuant VOL-style {window} day average turnover; lower turnover is ranked higher."
  - name: turnover_volatility_20
    expression: "Std($turnover, 20)"
    direction: -1
    category: candidate_turnover
    description: "JoinQuant turnover volatility proxy: 20 day standard deviation of turnover; lower volatility is ranked higher."
  - name: arbr_26
    expression: "(Sum($high - $open, 26) / (Sum($open - $low, 26) + 0.000001)) - (Sum(Greater($high - Ref($close, 1), 0), 26) / (Sum(Greater(Ref($close, 1) - $low, 0), 26) + 0.000001))"
    direction: -1
    category: candidate_emotion
    description: "JoinQuant ARBR-style sentiment factor over 26 days; lower ARBR is ranked higher based on factorlib screening."
  - name: limit_pressure_5
    expression: "Mean(Greater($close / Ref($close, 1) - 1, 0.095), 5)"
    direction: -1
    category: candidate_emotion
    description: "A-share limit-up pressure proxy over 5 sessions; high recent limit-like moves indicate hot crowding."
  - name: heat_cooling_5_20
    expression: "Mean(Abs($close / Ref($close, 1) - 1) * $turnover, 5) / (Mean(Abs($close / Ref($close, 1) - 1) * $turnover, 20) + 0.000001)"
    direction: -1
    category: candidate_emotion
    description: "Short-term price-turnover heat versus 20 day baseline; lower heat is favored after crowding cools."
  - name: breadth_proxy_20
    expression: "Mean(Greater($close / Ref($close, 1) - 1, 0), 20) - Mean(Less($close / Ref($close, 1) - 1, 0), 20)"
    direction: 1
    category: candidate_emotion
    description: "Single-name market breadth proxy: 20 day balance of up days versus down days."
  - name: boll_position_20
    expression: "($close - Mean($close, 20)) / (2 * Std($close, 20) + 0.000001)"
    direction: -1
    category: candidate_technical
    description: "JoinQuant Bollinger-band position proxy; lower price position inside the band is ranked higher."
  - name: tushare_ep_ttm
    expression: "1 / ($pe_ttm + 0.000001)"
    direction: 1
    category: candidate_value
    description: "Tushare daily_basic PE TTM inverted into an earnings-yield value proxy."
  - name: tushare_bp
    expression: "1 / ($pb + 0.000001)"
    direction: 1
    category: candidate_value
    description: "Tushare daily_basic PB inverted into a book-to-price value proxy."
  - name: tushare_dividend_yield
    expression: "$dividend_yield"
    direction: 1
    category: candidate_dividend
    description: "Tushare daily_basic dividend yield candidate."
  - name: tushare_free_float_turnover_20
    expression: "Mean($turnover_rate_f, 20)"
    direction: 1
    category: candidate_liquidity
    description: "20 day average free-float turnover from Tushare daily_basic."
  - name: tushare_total_mv
    expression: "$total_mv"
    direction: 1
    category: candidate_size_capacity
    description: "Tushare daily_basic total market value for capacity and size exposure diagnostics."
  - name: amihud_illiq_{window}
    expression: "Mean(Abs($close / Ref($close, 1) - 1) / ($amount + 1), {window})"
    windows: [10, 20, 60]
    direction: -1
    category: candidate_liquidity
    description: "{window} day Amihud-style illiquidity proxy; lower values are ranked higher."
  - name: price_volume_divergence_{window}
    expression: "($close / Ref($close, {window}) - 1) - (Mean($volume, {window}) / Ref(Mean($volume, {window}), {window}) - 1)"
    windows: [10, 20, 60]
    direction: 1
    category: candidate_divergence
    description: "{window} day price momentum minus volume momentum."
  - name: quiet_breakout_{window}
    expression: "($close / Ref($close, {window}) - 1) - (Mean($volume, 5) / Mean($volume, {window}) - 1)"
    windows: [20, 60]
    direction: 1
    category: candidate_divergence
    description: "{window} day price advance not confirmed by recent volume expansion."
  - name: max_drawdown_{window}
    expression: "Max($close, {window}) / $close - 1"
    windows: [20, 60]
    direction: -1
    category: candidate_drawdown_quality
    description: "{window} day current drawdown from rolling close high; lower drawdown is ranked higher."
  - name: downside_vol_{window}
    expression: "Std(Less($close / Ref($close, 1) - 1, 0) * ($close / Ref($close, 1) - 1), {window})"
    windows: [20, 60]
    direction: -1
    category: candidate_downside_volatility
    description: "{window} day downside-only return volatility; lower downside volatility is ranked higher."
  - name: gap_risk_20
    expression: "Mean(Abs($open / Ref($close, 1) - 1), 20)"
    direction: -1
    category: candidate_gap_risk
    description: "20 day average overnight open gap magnitude; lower gap risk is ranked higher."
  - name: intraday_excursion_20
    expression: "Mean(($high - $low) / $open, 20)"
    direction: -1
    category: candidate_intraday_excursion
    description: "20 day average intraday high-low excursion relative to open; lower excursion is ranked higher."
  - name: wangji-ignition-setup
    expression: "(4 - Abs((Max(Ref($close, 1), 20) / Min(Ref($close, 1), 20) - 1) - 0.06) / 0.04) + (1.5 * Greater(Less(Ref(Max($close, 60), 1) / Ref($close, 1) - 1, 0.35), 0) / 0.35) - ((Abs(Mean(Ref($close, 1), 5) / Mean(Ref($close, 1), 30) - 1) + Abs(Mean(Ref($close, 1), 13) / Mean(Ref($close, 1), 30) - 1) + Abs(Mean(Ref($close, 1), 21) / Mean(Ref($close, 1), 30) - 1)) / 0.06) + (Less($close / Ref($close, 1) - 1, 0.12) / 0.06) + (Less($close / $open - 1, 0.12) / 0.06) + (($close - $low) / ($high - $low + 0.000001)) + (Less($volume / (Mean(Ref($volume, 1), 20) + 1), 3.0) / 1.5) - (Abs($close / Mean($close, 60) - 1) / 0.15)"
    direction: 1
    category: candidate_pattern
    description: "Wangji pre-confirmation ignition day setup: low-base tight range after prior drawdown, converged short moving averages, strong current price body, close near high, and current volume burst before the days 12-14 low-volume washout confirmation."
  - name: wangji-factor1
    expression: "If(And(Le(Max(Ref($close, 4), 10) / Min(Ref($close, 4), 10) - 1, 0.06), And(Ge(Ref($close, 3) / Ref($close, 4) - 1, 0.07), And(Gt(Ref($close, 3), Ref($open, 3)), And(Ge(Ref($volume, 3) / (Mean(Ref($volume, 4), 10) + 1), 2.0), And(Gt(Ref($close, 2) / Ref($close, 3) - 1, -0.03), And(Lt(Ref($close, 2) / Ref($close, 3) - 1, 0), And(Gt(Ref($close, 1) / Ref($close, 2) - 1, -0.03), And(Lt(Ref($close, 1) / Ref($close, 2) - 1, 0), And(Gt($close / Ref($close, 1) - 1, -0.03), And(Lt($close / Ref($close, 1) - 1, 0), And(Lt(Ref($volume, 2), Ref($volume, 3)), And(Lt(Ref($volume, 1), Ref($volume, 3)), Lt($volume, Ref($volume, 3)))))))))))))), 1, 0)"
    direction: 1
    category: candidate_pattern
    description: "Wangji binary full match: days 1-10 close range <= 6%, day-11 bullish ignition return >= 7% with volume >= 2x prior 10-day mean, and days 12-14 each drift down less than 3% while volume stays below ignition volume; current date is the confirmation day."
  - name: wangji-factor2
    expression: "If(And(Gt(Mean($close, 5), Mean(Ref($close, 5), 5)), And(Gt(Mean(Ref($close, 5), 5), Mean(Ref($close, 10), 5)), And(Gt(Mean(Ref($close, 10), 5), Mean(Ref($close, 15), 5)), And(Gt(Mean(Ref($close, 15), 5), Mean(Ref($close, 20), 5)), And(Ge(Max(Ref(And(Gt($close, Mean($close, 21)), And(Gt(Mean($close, 5), Mean($close, 13)), And(Ge($close / (Min(Ref($low, 1), 20) + 0.000001) - 1, 0.08), Gt(Mean($close, 13), Ref(Mean($close, 13), 3))))), 10), 51), 1), And(Gt($close, Mean($close, 60)), And(Gt(Mean($close, 21), Ref(Mean($close, 21), 5)), And(Gt(Mean($close, 5), Mean($close, 13)), And(Gt(Mean($close, 13), Mean($close, 21)), And(Gt(Max(Ref($close, 3), 20), Max(Ref($high, 23), 60)), And(Le(Min(Ref($low, 1), 10) / (Mean($close, 21) + 0.000001), 1.04), And(Ge(Min(Ref($close, 1), 10) / (Mean($close, 21) + 0.000001), 0.93), And(Lt(Min(Ref($close, 1), 10), Max(Ref($close, 1), 10) * 0.96), And(Le(Mean(Ref($volume, 1), 5) / (Mean(Ref($volume, 10), 10) + 1), 1.35), And(Ge($close / Ref($close, 1) - 1, 0.02), And(Ge($close / $open - 1, 0.02), And(Gt($close, Mean($close, 5)), And(Gt($close, Mean($close, 13)), And(Ge(($close - $low) / ($high - $low + 0.000001), 0.55), And(Ge($volume / (Mean(Ref($volume, 1), 10) + 1), 1.1), Gt($close, Max(Ref($close, 1), 10)))))))))))))))))))))), 1, 0)"
    direction: 1
    category: candidate_pattern
    description: "Wangji 2B pullback confirmation after prior golden buy: require a weekly bullish trend proxy, a prior golden buy 10-60 trading days ago, multi-average bullish alignment, prior space-open breakout, controlled low-volume pullback toward MA13/MA21, and current bullish confirmation back above MA5/MA13 through the recent 10-day close high."
  - name: wangji-reversal20-combo
    expression: "If(And(And(Le(Max(Ref($close, 4), 10) / Min(Ref($close, 4), 10) - 1, 0.06), And(Ge(Ref($close, 3) / Ref($close, 4) - 1, 0.07), And(Gt(Ref($close, 3), Ref($open, 3)), And(Ge(Ref($volume, 3) / (Mean(Ref($volume, 4), 10) + 1), 2.0), And(Gt(Ref($close, 2) / Ref($close, 3) - 1, -0.03), And(Lt(Ref($close, 2) / Ref($close, 3) - 1, 0), And(Gt(Ref($close, 1) / Ref($close, 2) - 1, -0.03), And(Lt(Ref($close, 1) / Ref($close, 2) - 1, 0), And(Gt($close / Ref($close, 1) - 1, -0.03), And(Lt($close / Ref($close, 1) - 1, 0), And(Lt(Ref($volume, 2), Ref($volume, 3)), And(Lt(Ref($volume, 1), Ref($volume, 3)), Lt($volume, Ref($volume, 3)))))))))))))), Ge(Ref($close, 20) / $close - 1, 0.03)), 1, 0)"
    direction: 1
    category: candidate_pattern
    description: "Binary gate-style combo: require a full Wangji 14-day pattern match and at least 3% 20-day drawdown repair room; no similarity score or boost."
