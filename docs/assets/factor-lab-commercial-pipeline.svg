<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Factor Lab daily research pipeline</title>
  <desc id="desc">A business-facing overview of Factor Lab daily pipeline: governed A-share data flows through factor signals, review gates, portfolio controls, and paper execution artifacts.</desc>
  <defs>
    <linearGradient id="canvas" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.48" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#059669"/>
      <stop offset="1" stop-color="#84cc16"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="145%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="145%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="13" markerHeight="13" refX="10.5" refY="6.5" orient="auto">
      <path d="M2,2 L11,6.5 L2,11 Z" fill="#334155"/>
    </marker>
    <style>
      .h1 { font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 48px; font-weight: 780; fill: #0f172a; letter-spacing: 0; }
      .sub { font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 18px; font-weight: 520; fill: #475569; letter-spacing: 0; }
      .kicker { font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 12px; font-weight: 760; fill: #64748b; letter-spacing: 1.2px; }
      .panelTitle { font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 24px; font-weight: 760; fill: #0f172a; letter-spacing: 0; }
      .panelSub { font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 13px; font-weight: 650; fill: #64748b; letter-spacing: 0; }
      .whiteTitle { font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 22px; font-weight: 760; fill: #ffffff; letter-spacing: 0; }
      .whiteSub { font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 13px; font-weight: 620; fill: rgba(255,255,255,0.82); letter-spacing: 0; }
      .cardTitle { font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 16px; font-weight: 760; fill: #0f172a; letter-spacing: 0; }
      .body { font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 13px; font-weight: 540; fill: #475569; letter-spacing: 0; }
      .small { font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 11px; font-weight: 650; fill: #64748b; letter-spacing: 0; }
      .chip { font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 12px; font-weight: 760; fill: #334155; letter-spacing: 0; }
      .metric { font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 34px; font-weight: 800; fill: #0f172a; letter-spacing: 0; }
      .metricLabel { font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; font-size: 12px; font-weight: 700; fill: #64748b; letter-spacing: 0; }
      .flow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .thin { stroke: #cbd5e1; stroke-width: 1.3; fill: none; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#canvas)"/>
  <path d="M0 120 C220 40 380 150 540 92 C770 8 995 62 1168 138 C1345 216 1478 155 1600 78 L1600 0 L0 0 Z" fill="#ffffff" opacity="0.78"/>
  <path d="M0 862 C250 770 390 905 590 838 C815 760 985 788 1184 866 C1370 938 1478 900 1600 835 L1600 980 L0 980 Z" fill="#ffffff" opacity="0.66"/>

  <g transform="translate(70,58)">
    <text class="kicker" x="0" y="0">FACTOR LAB DAILY PIPELINE</text>
    <text class="h1" x="0" y="50">A 股 AI 投研流水线</text>
    <text class="sub" x="0" y="86">从可信数据到因子信号与主题研究候选，每日沉淀可审计的研究资产。</text>
  </g>

  <g transform="translate(1190,54)">
    <rect x="0" y="0" width="320" height="92" rx="8" fill="url(#navy)" filter="url(#softShadow)"/>
    <text class="whiteSub" x="24" y="30">Operating Principle</text>
    <text class="whiteTitle" x="24" y="61">先治理，再研究；只输出信号</text>
  </g>

  <g transform="translate(66,170)">
    <rect x="0" y="0" width="330" height="680" rx="8" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="0" y="0" width="330" height="84" rx="8" fill="url(#blue)"/>
    <text class="whiteSub" x="26" y="30">01 GOVERNED DATA ASSETS</text>
    <text class="whiteTitle" x="26" y="58">可信数据资产</text>

    <g transform="translate(24,112)">
      <rect width="282" height="86" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
      <text class="cardTitle" x="18" y="29">行情与交易状态</text>
      <text class="body" x="18" y="55">OHLCV / 停复牌 / 涨跌停 / 流动性</text>
    </g>
    <g transform="translate(24,216)">
      <rect width="282" height="86" rx="8" fill="#f0fdf4" stroke="#bbf7d0"/>
      <text class="cardTitle" x="18" y="29">PIT 主数据与财务域</text>
      <text class="body" x="18" y="55">行业 / ST / 市值 / EP / CFP / ROE</text>
    </g>
    <g transform="translate(24,320)">
      <rect width="282" height="108" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
      <text class="cardTitle" x="18" y="29">公告与事件证据</text>
      <text class="body" x="18" y="55">回购 / 减持 / 担保 / 监管 / 业绩预告</text>
      <text class="body" x="18" y="78">事件方向分 + 事件强度分</text>
    </g>
    <g transform="translate(24,452)">
      <rect width="282" height="78" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
      <text class="cardTitle" x="18" y="29">数据治理门禁</text>
      <text class="body" x="18" y="55">覆盖率 / 新鲜度 / PIT / Vendor Gate</text>
    </g>
    <g transform="translate(24,566)">
      <rect x="0" y="0" width="128" height="64" rx="8" fill="#f8fafc" stroke="#dbe4ef"/>
      <text class="metric" x="18" y="39">800</text>
      <text class="metricLabel" x="18" y="56">CSI300+CSI500</text>
      <rect x="154" y="0" width="128" height="64" rx="8" fill="#f8fafc" stroke="#dbe4ef"/>
      <text class="metric" x="172" y="39">PIT</text>
      <text class="metricLabel" x="172" y="56">时点一致</text>
    </g>
  </g>

  <g transform="translate(452,170)">
    <rect x="0" y="0" width="690" height="680" rx="8" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="0" y="0" width="690" height="84" rx="8" fill="url(#violet)"/>
    <text class="whiteSub" x="28" y="30">02 DAILY RESEARCH ENGINE</text>
    <text class="whiteTitle" x="28" y="58">每日投研引擎</text>

    <g transform="translate(34,116)">
      <rect width="286" height="96" rx="8" fill="#f8fafc" stroke="#dbe4ef"/>
      <text class="cardTitle" x="18" y="30">数据新鲜度检查</text>
      <text class="body" x="18" y="56">确认 Qlib 日历与最新可用交易日</text>
      <text class="small" x="18" y="78">失败即停止：data_freshness_failed</text>
    </g>
    <g transform="translate(370,116)">
      <rect width="286" height="96" rx="8" fill="#f8fafc" stroke="#dbe4ef"/>
      <text class="cardTitle" x="18" y="30">数据治理检查</text>
      <text class="body" x="18" y="56">非价格数据未达标进入 shadow</text>
      <text class="small" x="18" y="78">阻断项失败：data_governance_failed</text>
    </g>

    <path class="flow" d="M320 164 H362"/>

    <g transform="translate(34,252)">
      <rect width="286" height="118" rx="8" fill="#faf5ff" stroke="#e9d5ff"/>
      <text class="cardTitle" x="18" y="30">因子信号构建</text>
      <text class="body" x="18" y="56">Qlib 表达式 + 基本面 CSV 因子</text>
      <text class="body" x="18" y="80">价值 / 质量 / 成长 / 红利 / 事件</text>
      <text class="small" x="18" y="102">输出：signals.csv</text>
    </g>
    <g transform="translate(370,252)">
      <rect width="286" height="118" rx="8" fill="#ecfeff" stroke="#a5f3fc"/>
      <text class="cardTitle" x="18" y="30">事件风险增强</text>
      <text class="body" x="18" y="56">把公告事件映射到每只股票</text>
      <text class="body" x="18" y="80">正向催化 / watch / block / 证据链接</text>
      <text class="small" x="18" y="102">输出：event_risk_snapshot.csv</text>
    </g>

    <path class="flow" d="M320 311 H362"/>

    <g transform="translate(34,424)">
      <rect width="286" height="118" rx="8" fill="#f0fdf4" stroke="#bbf7d0"/>
      <text class="cardTitle" x="18" y="30">主题信号生成</text>
      <text class="body" x="18" y="56">按主题、质量、成长、动量分档</text>
      <text class="body" x="18" y="80">保留 top drivers 与 family contribution</text>
      <text class="small" x="18" y="102">输出：theme_scans/*.csv</text>
    </g>
    <g transform="translate(370,424)">
      <rect width="286" height="118" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
      <text class="cardTitle" x="18" y="30">证据解释包</text>
      <text class="body" x="18" y="56">因子诊断、公告证据、主题理由</text>
      <text class="body" x="18" y="80">标记 watch / risk / blocked 线索</text>
      <text class="small" x="18" y="102">输出：theme_scans/*.md</text>
    </g>

    <path class="flow" d="M320 483 H362"/>

    <g transform="translate(34,584)">
      <rect width="286" height="64" rx="8" fill="#fef2f2" stroke="#fecaca"/>
      <text class="cardTitle" x="18" y="27">信号质量门禁</text>
      <text class="body" x="18" y="50">覆盖率 / stale / family / 事件风险</text>
    </g>
    <g transform="translate(370,584)">
      <rect width="286" height="64" rx="8" fill="#f8fafc" stroke="#dbe4ef"/>
      <text class="cardTitle" x="18" y="27">审计归档</text>
      <text class="body" x="18" y="50">manifest 汇总所有产物与本轮配置</text>
    </g>

    <path class="flow" d="M180 214 V244"/>
    <path class="flow" d="M516 214 V244"/>
    <path class="flow" d="M180 372 V416"/>
    <path class="flow" d="M516 372 V416"/>
    <path class="flow" d="M180 544 V576"/>
    <path class="flow" d="M516 544 V576"/>
  </g>

  <g transform="translate(1198,170)">
    <rect x="0" y="0" width="336" height="680" rx="8" fill="#ffffff" filter="url(#shadow)"/>
    <rect x="0" y="0" width="336" height="84" rx="8" fill="url(#green)"/>
    <text class="whiteSub" x="26" y="30">03 CONTROLLED OUTPUTS</text>
    <text class="whiteTitle" x="26" y="58">可控交付物</text>

    <g transform="translate(26,112)">
      <rect width="284" height="86" rx="8" fill="#f0fdf4" stroke="#bbf7d0"/>
      <text class="cardTitle" x="18" y="30">当日信号</text>
      <text class="body" x="18" y="56">approved 因子合成解释型 signal</text>
      <text class="small" x="18" y="76">runs/YYYYMMDD/signals.csv</text>
    </g>
    <g transform="translate(26,216)">
      <rect width="284" height="86" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
      <text class="cardTitle" x="18" y="30">AI产业链信号</text>
      <text class="body" x="18" y="56">芯片 / 半导体 / 存储主题分档</text>
      <text class="small" x="18" y="76">ai_semiconductor_YYYYMMDD.csv</text>
    </g>
    <g transform="translate(26,320)">
      <rect width="284" height="108" rx="8" fill="#f8fafc" stroke="#dbe4ef"/>
      <text class="cardTitle" x="18" y="30">复盘与留痕</text>
      <text class="body" x="18" y="56">数据质量、因子解释、主题理由</text>
      <text class="body" x="18" y="80">每轮实验可追溯、可复查、可回放</text>
    </g>
    <g transform="translate(26,464)">
      <rect width="284" height="132" rx="8" fill="url(#amber)" opacity="0.95"/>
      <text class="whiteSub" x="22" y="34">Business Value</text>
      <text class="whiteTitle" x="22" y="66">更快覆盖，更少误判</text>
      <text class="whiteSub" x="22" y="94">让 AI 负责阅读、归因与初筛</text>
      <text class="whiteSub" x="22" y="116">让门禁负责信号质量控制</text>
    </g>
  </g>

  <path class="flow" d="M402 510 H444"/>
  <path class="flow" d="M1148 510 H1190"/>

  <g transform="translate(70,890)">
    <rect x="0" y="-38" width="1460" height="64" rx="8" fill="#0f172a" filter="url(#softShadow)"/>
    <text x="26" y="2" style="font-family: Inter, 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif; font-size: 18px; font-weight: 740; fill: #ffffff; letter-spacing: 0;">Daily Pipeline = 可信数据资产 -> 因子信号 -> AI产业链主题信号 -> 证据解释 -> 质量门禁 -> 审计归档</text>
  </g>
</svg>
